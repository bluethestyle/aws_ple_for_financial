# =============================================================================
# Santander -- Feature Group Definitions
# =============================================================================
# Mapped to 5-axis feature architecture:
#   State axis     -- static demographics / account attributes
#   Snapshot axis  -- long-term sequence summaries (TDA global, HMM, trends)
#   Timeseries axis -- short-term temporal patterns (TDA local, Mamba, txn)
#   Hierarchy axis -- product/MCC tree embeddings (Poincare)
#   Item axis      -- collaborative filtering (LightGCN, product holdings)
#
# Plus derived groups: GMM clustering, model-derived (KMeans, Bandit, LNN)
#
# Column names matched EXACTLY to santander_final_schema.json
# Total estimated dimensions: ~500D
# =============================================================================

feature_groups:

  # =========================================================================
  # STATE AXIS -- static demographics / account attributes
  # =========================================================================

  # -------------------------------------------------------------------------
  # 1. Demographics (transform) -- ~20D
  #    Exact columns from schema: age, income, tenure_months, is_active,
  #    num_products + encoded gender/segment/country/channel/age_group/income_group
  #
  #    NOTES:
  #    - income: 25.4% missing (0 = not reported) -> median imputation
  #    - tenure_months: -999999 sentinel -> clip to 0 + flag column
  # -------------------------------------------------------------------------
  - name: demographics
    group_type: transform
    transformers: [quantile_transformer]
    columns:
      - age                    # INTEGER, 18-100
      - income                 # DOUBLE, 0-28.8M EUR (25.4% null/zero)
      - tenure_months          # INTEGER, -999999~256 (sentinel = unknown)
      - num_products           # INTEGER, 0-15, avg 1.3
      - is_active              # INTEGER, 0/1, 42% active
    categorical_columns:
      - gender                 # F, M (2 values)
      - segment                # 01-TOP, 02-PARTICULARES, 03-UNIVERSITARIO, UNKNOWN (4 values)
      - country                # 118 countries (ES 96%)
      - channel                # 163 channel codes
      - age_group              # young, adult, middle, senior, elderly (5 values)
      - income_group           # low, mid, high, very_high, unknown (5 values)
    preprocessing:
      income:
        null_indicator: 0
        null_rate: 0.254
        strategy: median
      tenure_months:
        sentinel: -999999
        strategy: clip_and_flag
        clip_min: 0
        clip_max: 256
    output_dim: 38
    target_experts: [deepfm, mlp, causal, optimal_transport]
    interpretation:
      category: demographics
      template: "{feature} is {value}, indicating a {direction} customer profile"
      narrative_lens: lifecycle
      primary_tasks: [churn_signal, product_stability, segment_prediction, tenure_stage]
    distill: true
    distill_weight: 1.0

  # -------------------------------------------------------------------------
  # 2. Product holdings (transform) -- 24D
  #    All 24 binary prod_* columns from schema (exact names)
  # -------------------------------------------------------------------------
  - name: product_holdings
    group_type: transform
    transformers: []
    columns:
      - prod_saving            # 0.3%
      - prod_guarantee         # 0.1%
      - prod_checking          # 60%
      - prod_derivados         # 0.2%
      - prod_payroll_acct      # 8%
      - prod_junior_acct       # 0.4%
      - prod_particular_acct   # 1%
      - prod_particular_plus   # 11%
      - prod_short_deposit     # 4%
      - prod_medium_deposit    # 0.1%
      - prod_long_deposit      # 0.1%
      - prod_e_account         # 3%
      - prod_funds             # 8%
      - prod_mortgage          # 2%
      - prod_pension_plan      # 0.3%
      - prod_loans             # 1%
      - prod_taxes             # 0.2%
      - prod_credit_card       # 5%
      - prod_securities        # 4%
      - prod_home_acct         # 2%
      - prod_payroll           # 0.1%
      - prod_pension_deposit   # 5%
      - prod_direct_debit      # 6%
      - prod_auto_debit        # 12%
    output_dim: 24
    target_experts: [deepfm, mlp, causal, optimal_transport]
    interpretation:
      category: product_ownership
      template: "Customer {holds/does_not_hold} {product}, indicating {direction} portfolio"
      narrative_lens: lifecycle
      primary_tasks: [nba_primary, churn_signal, product_stability]
    distill: true
    distill_weight: 1.0

  # -------------------------------------------------------------------------
  # 3. Transaction behavior (transform) -- 14D
  #    All 14 synth_* columns from schema (exact names)
  #    NOTE: synth_fraud_ratio is ALL ZERO -- included for completeness
  #          but will have zero variance (may be dropped by pipeline)
  # -------------------------------------------------------------------------
  - name: txn_behavior
    group_type: transform
    transformers: [standard_scaler]
    columns:
      - synth_monthly_txns     # INTEGER, 20-157, avg 69
      - synth_avg_amount       # DOUBLE, 1-218 USD, avg 49
      - synth_monthly_spend    # DOUBLE, 536-7542 USD, avg 3146
      - synth_unique_mcc       # INTEGER, 6-23, avg 16
      - synth_unique_merchants # INTEGER, 11-33, avg 24
      - synth_morning_ratio    # DOUBLE, 0.2-0.65
      - synth_afternoon_ratio  # DOUBLE, 0.23-0.57
      - synth_evening_ratio    # DOUBLE, 0.08-0.30
      - synth_night_ratio      # DOUBLE, 0.02-0.14
      - synth_recency_days     # DOUBLE, 0.2-1.0 (RFM recency normalized)
      - synth_frequency        # INTEGER, 25-131 (RFM frequency)
      - synth_monetary         # DOUBLE, 1250-5430 USD (RFM monetary)
      - synth_stability        # DOUBLE, 0.58-1.76 (1=stable, CV-based)
      - synth_fraud_ratio      # DOUBLE, ALL 0.0 (zero variance)
    output_dim: 14
    target_experts: [deepfm, temporal_ensemble, causal, optimal_transport]
    interpretation:
      category: transaction_behavior
      template: "{feature} shows {direction} transaction behavior at {value}"
      narrative_lens: engagement
      primary_tasks: [nba_primary]
    distill: true
    distill_weight: 1.0

  # -------------------------------------------------------------------------
  # 4. Derived temporal aggregates (transform) -- 4D
  #    From temporal_aggregate group in schema
  # -------------------------------------------------------------------------
  - name: derived_temporal
    group_type: transform
    transformers: [standard_scaler]
    columns:
      - total_acquisitions     # BIGINT, 0-22, avg 0.6
      - total_churns           # BIGINT, 0-22, avg 0.56
      - months_observed        # BIGINT, 1-17, avg 14.3
      - product_diversity      # BIGINT, 0-15, avg 1.56
    output_dim: 4
    target_experts: [deepfm, causal, optimal_transport]
    interpretation:
      category: product_lifecycle
      template: "{feature} at {value} indicates {direction} product activity"
      narrative_lens: lifecycle
      primary_tasks: [churn_signal, cross_sell_count, product_stability]
    distill: true
    distill_weight: 0.9

  # =========================================================================
  # SNAPSHOT AXIS -- long-term sequence summaries (generated features)
  # =========================================================================

  # -------------------------------------------------------------------------
  # 5. TDA Global topology (generate) -- 36D
  #    Population-level persistent homology from all user features.
  #    Long-window (365d) Rips complex summary.
  # -------------------------------------------------------------------------
  - name: tda_global
    group_type: generate
    generator: tda_global
    generator_params:
      input_filter:
        dtype: continuous
        exclude_binary: true
        min_nunique: 20
        exclude_columns: [customer_id, has_nba, churn_signal, product_stability]
        exclude_prefix: ["label_"]  # prevent label columns leaking into TDA input
      max_homology_dim: 1
    output_dim: 36
    target_experts: [perslay]
    interpretation:
      category: domain_topology
      template: "Global topology shows {pattern} pattern with {value} persistence"
      narrative_lens: lifecycle
      primary_tasks: [churn_signal, product_stability, segment_prediction]
    distill: true
    distill_weight: 0.5

  # -------------------------------------------------------------------------
  # 6. TDA Local topology (generate) -- 24D
  #    Individual-level persistent homology from txn sequences.
  #    Short-window (90d) sliding window analysis.
  # -------------------------------------------------------------------------
  - name: tda_local
    group_type: generate
    generator: tda_local
    generator_params:
      input_filter:
        dtype: continuous
        exclude_binary: true
        include_prefix: ["synth_"]
        exclude_columns: [customer_id]
      max_homology_dim: 1
      n_jobs: 1
    output_dim: 24
    target_experts: [perslay]
    interpretation:
      category: domain_topology
      template: "Local transaction topology shows {pattern} with {value} persistence"
      narrative_lens: engagement
      primary_tasks: [next_mcc, top_mcc_shift]
    distill: true
    distill_weight: 0.5

  # -------------------------------------------------------------------------
  # 7. HMM states (generate) -- 48D
  #    Product holding state transitions from seq_* columns.
  #    Triple-mode: journey, lifecycle, behavior.
  # -------------------------------------------------------------------------
  - name: hmm_states
    group_type: generate
    generator: hmm
    generator_params:
      input_filter:
        include_prefix: ["synth_"]
      modes: [journey, lifecycle, behavior]
    output_dim: 48
    target_experts: [temporal_ensemble]
    interpretation:
      category: behavioral_state
      template: "Customer {mode} state indicates {state} at confidence {value}"
      narrative_lens: lifecycle
      primary_tasks: [churn_signal, product_stability, nba_primary]
    distill: false

  # =========================================================================
  # TIMESERIES AXIS -- short-term temporal patterns (generated features)
  # =========================================================================

  # -------------------------------------------------------------------------
  # 8. Mamba temporal features (generate) -- 50D
  #    Selective state-space model on transaction sequences.
  # -------------------------------------------------------------------------
  - name: mamba_temporal
    group_type: generate
    generator: mamba
    generator_params:
      input_filter:
        include_prefix: ["synth_"]
      output_dim: 50
      d_model: 128
      num_epochs: 3
      prefer_gpu: true
      entity_column: customer_id
      base_batch_size: 256   # RTX 4070 12GB: avoid OOM with seq_len=90
    output_dim: 50
    target_experts: [temporal_ensemble]
    interpretation:
      category: temporal_state
      template: "Mamba temporal state indicates {direction} trend at {value}"
      narrative_lens: engagement
      primary_tasks: [next_mcc, mcc_diversity_trend, top_mcc_shift]
    distill: false

  # =========================================================================
  # HIERARCHY AXIS -- product tree embeddings (generated features)
  # =========================================================================

  # -------------------------------------------------------------------------
  # 9. Product hierarchy (generate) -- 32D
  #    24 products in 6 L1 groups -> Poincare embedding.
  #    Uses item_universe.yaml for hierarchy definition.
  # -------------------------------------------------------------------------
  - name: product_hierarchy
    group_type: generate
    generator: graph
    generator_params:
      input_filter:
        include_prefix: ["prod_"]   # binary product holdings for co-holding graph
      use_poincare: true
      curvature: 1.0
      embedding_dim: 32
      prefix: product_hierarchy
      entity_column: customer_id
    output_dim: 32
    target_experts: [lightgcn, causal]  # LightGCN for collaborative filtering, not HGCN
    interpretation:
      category: product_structure
      template: "Position in product hierarchy suggests {insight} at depth {value}"
      narrative_lens: consumption
      primary_tasks: [nba_primary, cross_sell_count]
    distill: false

  # -------------------------------------------------------------------------
  # 13b. Merchant Hierarchy (generate) -- 27D
  #      MCC tree Poincaré embeddings for HGCN expert.
  #      L1 (10 categories) → L2 (30 subcategories) → MCC codes.
  #      Follows on-prem design: hyperbolic space for tree structure.
  # -------------------------------------------------------------------------
  - name: merchant_hierarchy
    group_type: generate
    generator: merchant_hierarchy
    generator_params:
      mcc_hierarchy_path: configs/mcc_hierarchy.yaml
      mcc_seq_column: txn_mcc_seq
      amount_seq_column: txn_amount_seq
      day_offset_seq_column: txn_day_offset_seq
      truncate_seq_last: 1    # drop last MCC = next_mcc label, prevents leakage
      l1_radius: 0.8
      l2_radius: 0.5
      time_decay_lambda: 0.01
      prefix: merchant_hierarchy
    output_dim: 27
    target_experts: [hgcn]  # HGCN: MCC hierarchy in hyperbolic space
    interpretation:
      category: merchant_structure
      template: "Merchant spending pattern indicates {direction} category preference"
      narrative_lens: consumption
      primary_tasks: [next_mcc, mcc_diversity_trend, top_mcc_shift, spend_level]
    distill: false

  # =========================================================================
  # ITEM AXIS -- collaborative filtering / product holdings (generated)
  # =========================================================================

  # -------------------------------------------------------------------------
  # 10. Graph collaborative filtering (generate) -- 64D
  #     Customer-product bipartite graph -> LightGCN embedding.
  #     Uses all 24 prod_* columns (exact names from schema).
  # -------------------------------------------------------------------------
  - name: graph_collaborative
    group_type: generate
    generator: graph
    generator_params:
      input_filter:
        dtype: all_numeric        # binary OK for bipartite graph
        exclude_columns: [customer_id, has_nba, churn_signal, product_stability]
        exclude_prefix: ["label_"]  # prevent label columns leaking into graph embedding
      embedding_dim: 64
      use_poincare: false
      prefix: graph_collab
      entity_column: customer_id
    output_dim: 64
    target_experts: [lightgcn]
    interpretation:
      category: collaborative
      template: "Collaborative signal suggests {insight} product affinity at {value}"
      narrative_lens: consumption
      primary_tasks: [nba_primary, cross_sell_count]
    distill: false

  # =========================================================================
  # DERIVED GROUPS (generated features)
  # =========================================================================

  # -------------------------------------------------------------------------
  # 11. GMM clustering (generate) -- 22D
  #     GMM on demographics + txn_behavior features.
  #     20 soft assignments + entropy + dominant cluster.
  # -------------------------------------------------------------------------
  - name: gmm_clustering
    group_type: generate
    generator: gmm
    generator_params:
      input_filter:
        dtype: continuous
        exclude_binary: true      # CRITICAL: no binary features for GMM
        min_nunique: 10
        exclude_columns: [customer_id]
      n_clusters: 20
      covariance_type: full
      max_iter: 200
    output_dim: 22
    target_experts: [deepfm, mlp, causal, optimal_transport]
    interpretation:
      category: customer_segment
      template: "Customer belongs to cluster pattern {value}, suggesting {direction} segment"
      narrative_lens: lifecycle
      primary_tasks: [segment_prediction, nba_primary, tenure_stage]
    distill: true
    distill_weight: 0.8

  # -------------------------------------------------------------------------
  # 12. Model-derived features (generate) -- 27D
  #     KMeans(5) + Bandit/MAB(4) + LNN(18)
  # -------------------------------------------------------------------------
  - name: model_derived
    group_type: generate
    generator: model_features
    generator_params:
      input_filter:
        dtype: continuous
        exclude_binary: true
        exclude_columns: [customer_id]
      kmeans_dim: 5
      bandit_dim: 4
      lnn_dim: 18
    output_dim: 27
    target_experts: [temporal_ensemble, deepfm]
    interpretation:
      category: model_insight
      template: "Model-derived {feature} at {value} indicates {direction} behavioral pattern"
      narrative_lens: lifecycle
      primary_tasks: [churn_signal, product_stability, nba_primary, spend_level]
    distill: false
