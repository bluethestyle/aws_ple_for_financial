# =============================================================================
# Santander Customer Transactions Pipeline Configuration
# 941,132 users x 89 columns x 13 tasks x 7 shared experts
# (was 18 tasks; 4 deterministic-leakage removed 2026-04-10, has_nba folded 2026-04-12)
# =============================================================================
# User-level synthetic dataset with product holdings, transaction sequences,
# and demographic attributes.  Pre-aggregated -- no transaction-level joins.
#
# Data: data/synthetic/santander_final.parquet
# Schema: data/synthetic/santander_final_schema.json
# =============================================================================

task_name: santander_ple

adapter: santander
feature_groups_file: configs/santander/feature_groups.yaml

# ---------------------------------------------------------------------------
# Tasks -- 13 tasks across 4 tiers  (was 18→14→13; has_nba folded into nba_primary)
# ---------------------------------------------------------------------------
# NOTE: fraud_risk excluded -- synth_fraud_ratio is ALL ZERO (useless label)
# NOTE: has_nba folded into nba_primary (class 0 = no NBA, 2026-04-12)
# NOTE: Tier 4 per-product tasks dropped (redundant with Tier 3 groups)
# NOTE: 3 txn-based NBA tasks added (Tier 5)
# NOTE: 4 tasks removed for deterministic leakage (feature → bucket(feature)):
#   income_tier, tenure_stage, spend_level, engagement_score
#   These source features ARE model inputs, so the model trivially reconstructs
#   the label. Including them produces artificially inflated multi-task metrics.
# ---------------------------------------------------------------------------
tasks:

  # ===== Tier 1 — Core targets (4 tasks) =====
  # Direct labels from the dataset

  # REMOVED: has_nba — folded into nba_primary (class 0 = no NBA).
  # Binary "will acquire any product?" is derivable from nba_primary != 0.
  # Keeping it as a separate task was redundant and inflated avg_auc.

  - name: churn_signal
    type: binary
    loss: focal
    loss_params:
      alpha: 0.85
      gamma: 2.0
    loss_weight: 2.0
    label_col: churn_signal
    description: "Churn signal: product count < prior avg x 0.7 (5.1% positive)"

  - name: product_stability
    type: regression
    loss: huber
    loss_weight: 1.5
    label_col: product_stability
    nullable: true
    description: "Product holding stability (1-CV), 0-1, avg 0.92, nullable"

  - name: nba_primary
    type: multiclass
    loss: ce
    loss_weight: 2.0
    label_col: label_nba_primary
    num_classes: 7
    topk_k: [1, 3]
    description: "Next best action -- product group to recommend (0=no_nba, 1=savings_guarantee, 2=checking_accounts, 3=deposits, 4=investments, 5=credit_loans, 6=debits)"
    derive:
      method: list_first_group
      source_col: nba_label
      filter_col: has_nba
      default: 0

  # ===== Tier 2 — Derived targets (2 tasks active; 2 removed for leakage) =====
  # Derived from existing columns via rules

  # REMOVED: deterministic leakage — tenure_months is a model input feature.
  # bucket(tenure_months) is perfectly reconstructable from the input itself.
  # Keep tenure_months as a numeric feature; do NOT use as a prediction target.
  #
  # - name: tenure_stage
  #   type: multiclass
  #   loss: ce
  #   loss_weight: 0.8
  #   label_col: label_tenure_stage
  #   num_classes: 5
  #   description: "Tenure bucket (unknown_or_new/early/mid/mature/veteran) from tenure_months"
  #   derive:
  #     method: bucket
  #     source_col: tenure_months
  #     boundaries: [6, 24, 60, 120]
  #     sentinel: -999999
  #     sentinel_class: 0
  #     class_names: [unknown_or_new, early, mid, mature, veteran]

  # REMOVED: deterministic leakage — synth_monthly_spend is a model input feature.
  # bucket(synth_monthly_spend) is perfectly reconstructable from the input itself.
  # Keep synth_monthly_spend as a numeric feature; do NOT use as a prediction target.
  #
  # - name: spend_level
  #   type: multiclass
  #   loss: ce
  #   loss_weight: 0.8
  #   label_col: label_spend_level
  #   num_classes: 4
  #   description: "Monthly spending tier from synth_monthly_spend"
  #   derive:
  #     method: bucket
  #     source_col: synth_monthly_spend
  #     boundaries: [1500, 3000, 5000]
  #     class_names: [low, moderate, high, very_high]

  - name: cross_sell_count
    type: regression
    loss: huber
    loss_weight: 1.0
    label_col: label_cross_sell_count
    description: "Number of products in nba_label list (0-24)"
    derive:
      method: len_of_list
      source_col: nba_label

  # REMOVED: deterministic leakage — is_active, synth_frequency, num_products are all
  # model input features. The weighted_sum label is an exact linear function of those
  # inputs and is perfectly reconstructable. Use these columns as features only.
  #
  # - name: engagement_score
  #   type: regression
  #   loss: huber
  #   loss_weight: 1.0
  #   label_col: label_engagement_score
  #   description: "Composite engagement: is_active*0.3 + synth_frequency/max*0.4 + num_products/max*0.3"
  #   derive:
  #     method: weighted_sum
  #     columns: [is_active, synth_frequency, num_products]
  #     weights: [0.3, 0.4, 0.3]
  #     normalize: true

  # ===== Tier 3 — Product group + segmentation (7 tasks) =====
  # NOTE: fraud_risk excluded (synth_fraud_ratio is ALL ZERO)

  - name: will_acquire_deposits
    type: binary
    loss: focal
    loss_params:
      alpha: 0.95
      gamma: 2.0
    loss_weight: 1.5
    label_col: label_acquire_deposits
    description: "Any of nba_label indices [8,9,10] (short/medium/long deposit)"
    derive:
      method: nba_group_check
      source_col: nba_label
      indices: [8, 9, 10]

  - name: will_acquire_investments
    type: binary
    loss: focal
    loss_params:
      alpha: 0.90
      gamma: 2.0
    loss_weight: 1.5
    label_col: label_acquire_investments
    description: "Any of nba_label indices [12,18] (funds, securities)"
    derive:
      method: nba_group_check
      source_col: nba_label
      indices: [12, 18]

  - name: will_acquire_accounts
    type: binary
    loss: focal
    loss_params:
      alpha: 0.85
      gamma: 2.0
    loss_weight: 1.2
    label_col: label_acquire_accounts
    description: "Any of nba_label indices [2,5,6,7,11,19] (checking, junior, particular, e_account, home)"
    derive:
      method: nba_group_check
      source_col: nba_label
      indices: [2, 5, 6, 7, 11, 19]

  - name: will_acquire_lending
    type: binary
    loss: focal
    loss_params:
      alpha: 0.90
      gamma: 2.0
    loss_weight: 1.5
    label_col: label_acquire_lending
    description: "Any of nba_label indices [13,15] (mortgage, loans)"
    derive:
      method: nba_group_check
      source_col: nba_label
      indices: [13, 15]

  - name: will_acquire_payments
    type: binary
    loss: focal
    loss_params:
      alpha: 0.85
      gamma: 2.0
    loss_weight: 1.2
    label_col: label_acquire_payments
    description: "Any of nba_label indices [4,17,20,22,23] (credit_card, direct/auto debit, payroll)"
    derive:
      method: nba_group_check
      source_col: nba_label
      indices: [4, 17, 20, 22, 23]

  - name: segment_prediction
    type: multiclass
    loss: ce
    loss_weight: 1.0
    label_col: label_segment
    num_classes: 4
    description: "Customer segment: 01-TOP=0, 02-PARTICULARES=1, 03-UNIVERSITARIO=2, UNKNOWN=3"
    derive:
      method: string_map
      source_col: segment
      mapping: {"01-TOP": 0, "02-PARTICULARES": 1, "03-UNIVERSITARIO": 2, "UNKNOWN": 3}

  # REMOVED: deterministic leakage — income is a model input feature.
  # bucket(income) is perfectly reconstructable from the input itself.
  # Keep income as a numeric feature and income_group as a categorical embedding;
  # do NOT use income bucketing as a prediction target.
  #
  # - name: income_tier
  #   type: multiclass
  #   loss: ce
  #   loss_weight: 0.8
  #   label_col: label_income_tier
  #   num_classes: 4
  #   description: "Income tier: low(<30k)=0, mid(30-80k)=1, high(80-200k)=2, very_high(200k+)=3"
  #   derive:
  #     method: bucket
  #     source_col: income
  #     boundaries: [30000, 80000, 200000]
  #     class_names: [low, mid, high, very_high]

  # ===== Tier 5 — Transaction-based NBA (3 tasks) =====
  # Derived from txn_mcc_seq transaction sequences
  #
  # LEAKAGE NOTE (all 3 tasks below): txn_mcc_seq must be TRUNCATED before
  # feature generation — exclude the last element of the sequence (i.e., use
  # txn_mcc_seq[:-1] as the model input, txn_mcc_seq[-1] as the label target).
  # Passing the full sequence to any feature generator (HMM, Mamba, TDA, etc.)
  # leaks the label transaction into the input representation.
  # Truncation must be applied BEFORE calling any sequence-based generator,
  # and AFTER temporal split to avoid look-ahead from future rows.

  - name: next_mcc
    type: multiclass
    loss: ce
    loss_weight: 1.2
    label_col: label_next_mcc
    num_classes: 50
    topk_k: [1, 5, 10]
    description: "Predict next MCC category from txn sequence (top-50 MCCs)"
    # LEAKAGE NOTE: txn_mcc_seq must be truncated (exclude last element) before
    # feature generation. Label = txn_mcc_seq[-1]; Input = txn_mcc_seq[:-1].
    derive:
      method: sequence_next
      source_seq: txn_mcc_seq
      top_k: 50

  - name: mcc_diversity_trend
    type: regression
    loss: huber
    loss_weight: 0.8
    label_col: label_mcc_diversity_trend
    description: "MCC diversity trend: change in unique MCC count over recent windows"
    # LEAKAGE NOTE: txn_mcc_seq must be truncated (exclude last element) before
    # feature generation. Trend is computed from txn_mcc_seq[:-1] only.
    derive:
      method: sequence_diversity_trend
      source_seq: txn_mcc_seq
      window_sizes: [10, 30]

  - name: top_mcc_shift
    type: binary
    loss: focal
    loss_params:
      alpha: 0.70
      gamma: 2.0
    loss_weight: 1.0
    label_col: label_top_mcc_shift
    description: "Did the customer's top MCC category change recently?"
    # LEAKAGE NOTE: txn_mcc_seq must be truncated (exclude last element) before
    # feature generation. Mode-shift is computed from txn_mcc_seq[:-1] only.
    derive:
      method: sequence_mode_shift
      source_seq: txn_mcc_seq
      window_sizes: [15, 30]

# ---------------------------------------------------------------------------
# Labels — derivation rules mapping actual columns to label columns
# ---------------------------------------------------------------------------
labels:
  # Tier 1: direct from dataset (3 labels exist as raw columns)
  # REMOVED: has_nba — folded into nba_primary (class 0 = no NBA, 2026-04-12)
  churn_signal:
    source: churn_signal
    type: direct
  product_stability:
    source: product_stability
    type: direct
  # Tier 1 derived: nba_primary (7-class product groups, 0=no_nba)
  label_nba_primary:
    source: nba_label
    type: list_first_group
    default: 0

  # Tier 2: derived from profile/synth columns
  # REMOVED: deterministic leakage — tenure_months is a model input; bucket is reconstructable.
  # label_tenure_stage:
  #   source: tenure_months
  #   type: bucket
  #   boundaries: [6, 24, 60, 120]
  #   sentinel: -999999
  #   sentinel_class: 0
  # REMOVED: deterministic leakage — synth_monthly_spend is a model input; bucket is reconstructable.
  # label_spend_level:
  #   source: synth_monthly_spend
  #   type: bucket
  #   boundaries: [1500, 3000, 5000]
  label_cross_sell_count:
    source: nba_label
    type: list_length
  # REMOVED: deterministic leakage — is_active, synth_frequency, num_products are model inputs.
  # The weighted_sum label is an exact linear function of those inputs.
  # label_engagement_score:
  #   source: [is_active, synth_frequency, num_products]
  #   type: weighted_sum
  #   weights: [0.3, 0.4, 0.3]
  #   normalize: true

  # Tier 3: product group acquisition (from nba_label indices)
  label_acquire_deposits:
    source: nba_label
    type: list_intersect
    indices: [8, 9, 10]
  label_acquire_investments:
    source: nba_label
    type: list_intersect
    indices: [12, 18]
  label_acquire_accounts:
    source: nba_label
    type: list_intersect
    indices: [2, 5, 6, 7, 11, 19]
  label_acquire_lending:
    source: nba_label
    type: list_intersect
    indices: [13, 15]
  label_acquire_payments:
    source: nba_label
    type: list_intersect
    indices: [4, 17, 20, 22, 23]

  # Tier 3: segmentation
  label_segment:
    source: segment
    type: string_map
    mapping: {"01-TOP": 0, "02-PARTICULARES": 1, "03-UNIVERSITARIO": 2, "UNKNOWN": 3}
  # REMOVED: deterministic leakage — income is a model input feature; bucket is reconstructable.
  # label_income_tier:
  #   source: income
  #   type: bucket
  #   boundaries: [30000, 80000, 200000]

  # Tier 5: transaction-based NBA labels
  label_next_mcc:
    source: txn_mcc_seq
    type: sequence_last
    top_k: 50
    default: -1
  label_mcc_diversity_trend:
    source: txn_mcc_seq
    type: sequence_diversity_trend
  label_top_mcc_shift:
    source: txn_mcc_seq
    type: sequence_mode_shift

# ---------------------------------------------------------------------------
# Sequences — two groups with different temporal resolutions
# ---------------------------------------------------------------------------
sequences:
  # Transaction sequences (ealtman-based synthetic)
  # mode: time_based uses window_days to filter by date range;
  #        count_based (legacy) uses max_len as fixed count.
  # Auto-detection: if timestamp_col exists in data, time_based is used;
  #                 otherwise falls back to count_based.
  txn_sequences:
    mode: time_based          # "time_based" | "count_based"
    window_days: 90           # look-back window in days
    stride_days: 30           # sliding window stride for bootstrapping
    max_len: 200              # safety cap (pad/truncate to this length)
    timestamp_col: txn_date   # column with per-txn timestamps (auto-detect)
    columns:
      txn_amount_seq:
        feat_dim: 1
        dtype: float
        description: "Transaction amount sequence (variable-length, up to 200)"
      txn_mcc_seq:
        feat_dim: 1
        dtype: int
        description: "MCC code sequence (variable-length, up to 200)"
      txn_hour_seq:
        feat_dim: 1
        dtype: int
        description: "Transaction hour sequence (0-23, variable-length)"
      txn_date_seq:
        feat_dim: 1
        dtype: int
        description: "Transaction date (YYYYMMDD int, for time-based windowing)"

  # Product holding sequences (Santander 17-month snapshots)
  # LEAKAGE FIX: truncate_last=1 drops month 17 (the label month) from
  # all product sequences.  max_len=16 uses months 1-16 only.
  # Product sequences remain count_based (monthly snapshots, not date-indexed).
  product_sequences:
    mode: count_based
    max_len: 16
    truncate_last: 1
    columns:
      seq_saving:        {feat_dim: 1, dtype: int, description: "Savings account holding (0/1/-1)"}
      seq_guarantee:     {feat_dim: 1, dtype: int, description: "Guarantee holding (0/1/-1)"}
      seq_checking:      {feat_dim: 1, dtype: int, description: "Checking account holding (0/1/-1)"}
      seq_derivados:     {feat_dim: 1, dtype: int, description: "Derivados holding (0/1/-1)"}
      seq_payroll_acct:  {feat_dim: 1, dtype: int, description: "Payroll account holding (0/1/-1)"}
      seq_junior_acct:   {feat_dim: 1, dtype: int, description: "Junior account holding (0/1/-1)"}
      seq_particular_acct: {feat_dim: 1, dtype: int, description: "Particular account holding (0/1/-1)"}
      seq_particular_plus: {feat_dim: 1, dtype: int, description: "Particular plus holding (0/1/-1)"}
      seq_short_deposit: {feat_dim: 1, dtype: int, description: "Short deposit holding (0/1/-1)"}
      seq_medium_deposit: {feat_dim: 1, dtype: int, description: "Medium deposit holding (0/1/-1)"}
      seq_long_deposit:  {feat_dim: 1, dtype: int, description: "Long deposit holding (0/1/-1)"}
      seq_e_account:     {feat_dim: 1, dtype: int, description: "E-account holding (0/1/-1)"}
      seq_funds:         {feat_dim: 1, dtype: int, description: "Funds holding (0/1/-1)"}
      seq_mortgage:      {feat_dim: 1, dtype: int, description: "Mortgage holding (0/1/-1)"}
      seq_pension_plan:  {feat_dim: 1, dtype: int, description: "Pension plan holding (0/1/-1)"}
      seq_loans:         {feat_dim: 1, dtype: int, description: "Loans holding (0/1/-1)"}
      seq_taxes:         {feat_dim: 1, dtype: int, description: "Taxes holding (0/1/-1)"}
      seq_credit_card:   {feat_dim: 1, dtype: int, description: "Credit card holding (0/1/-1)"}
      seq_securities:    {feat_dim: 1, dtype: int, description: "Securities holding (0/1/-1)"}
      seq_home_acct:     {feat_dim: 1, dtype: int, description: "Home account holding (0/1/-1)"}
      seq_payroll:       {feat_dim: 1, dtype: int, description: "Payroll service holding (0/1/-1)"}
      seq_pension_deposit: {feat_dim: 1, dtype: int, description: "Pension deposit holding (0/1/-1)"}
      seq_direct_debit:  {feat_dim: 1, dtype: int, description: "Direct debit holding (0/1/-1)"}
      seq_auto_debit:    {feat_dim: 1, dtype: int, description: "Auto debit holding (0/1/-1)"}
      seq_num_products:  {feat_dim: 1, dtype: int, description: "Total products held per month (0-15)"}
      seq_acquisitions:  {feat_dim: 1, dtype: int, description: "Monthly new acquisitions (len 1-16)"}
      seq_churns:        {feat_dim: 1, dtype: int, description: "Monthly churns (len 1-16)"}

# ---------------------------------------------------------------------------
# Task Groups — 4 semantic groups (adaTT transfer units)
# ---------------------------------------------------------------------------
task_groups:
  - name: engagement
    description: "고객이 반응하는가"
    # REMOVED from tasks: engagement_score (deterministic leakage)
    # REMOVED: has_nba — folded into nba_primary (2026-04-12)
    tasks: [next_mcc, top_mcc_shift]
    adatt_intra_strength: 0.8
    adatt_inter_strength: 0.3

  - name: lifecycle
    description: "고객이 어디에 있는가"
    # REMOVED from tasks: tenure_stage (deterministic leakage)
    tasks: [churn_signal, product_stability, segment_prediction]
    adatt_intra_strength: 0.7
    adatt_inter_strength: 0.3

  - name: value
    description: "언제/어디서 가치를 만드는가"
    # REMOVED from tasks: spend_level, income_tier (deterministic leakage)
    # value group now contains only mcc_diversity_trend; merged into consumption if desired
    tasks: [mcc_diversity_trend]
    adatt_intra_strength: 0.6
    adatt_inter_strength: 0.3

  - name: consumption
    description: "무엇을 소비하는가"
    tasks: [nba_primary, cross_sell_count, will_acquire_deposits, will_acquire_investments, will_acquire_accounts, will_acquire_lending, will_acquire_payments]
    adatt_intra_strength: 0.7
    adatt_inter_strength: 0.3

adatt:
  transfer_lambda: 0.1
  temperature: 1.0
  warmup_epochs: 3          # measure affinity before transfer (on-prem: 10)
  freeze_epoch: 8           # freeze transfer weights for stable fine-tuning
  grad_interval: 10         # extract gradients every N steps (on-prem: 10)
  inter_group_strength: 0.3

# ---------------------------------------------------------------------------
# Gradient Surgery — task-type gradient projection (replaces adaTT loss transfer)
# ---------------------------------------------------------------------------
grad_surgery:
  enabled: false          # toggle via HP override in ablation scenarios
  conflict_threshold: 0.0 # project when cos(g_i, g_j) < this value
  warmup_epochs: 3        # match adaTT warmup for fair comparison
  grad_interval: 10       # match adaTT grad_interval for fair comparison
  ema_decay: 0.9
  log_interval: 1
  task_type_groups:
    binary: [churn_signal, will_acquire_deposits, will_acquire_investments, will_acquire_accounts, will_acquire_lending, will_acquire_payments, top_mcc_shift]
    multiclass: [nba_primary, segment_prediction, next_mcc]
    regression: [product_stability, cross_sell_count, mcc_diversity_trend]

# ---------------------------------------------------------------------------
# Task Relationships — logit transfer between tasks
# ---------------------------------------------------------------------------
task_relationships:
  # REMOVED: has_nba → nba_primary (has_nba folded into nba_primary, 2026-04-12)

  - source: churn_signal
    target: product_stability
    type: causal
    transfer_method: output_concat
    description: "이탈 → 상품 안정성"

  # REMOVED: engagement_score was removed (deterministic leakage).
  # The relationship engagement_score → has_nba no longer applies.
  # - source: engagement_score
  #   target: has_nba
  #   type: sequential
  #   transfer_method: output_concat
  #   description: "활성도 → 가입 (선행지표)"

  # REMOVED: spend_level was removed (deterministic leakage).
  # The relationship spend_level → cross_sell_count no longer applies.
  # - source: spend_level
  #   target: cross_sell_count
  #   type: causal
  #   transfer_method: output_concat
  #   description: "소비수준 → 교차판매"

  - source: next_mcc
    target: nba_primary
    type: sequential
    transfer_method: hidden_concat
    description: "다음 업종 → 다음 상품 (feature sharing)"

logit_transfer_strength: 0.5

# ---------------------------------------------------------------------------
# Scoring — FD-TVS composite scoring for Santander
# ---------------------------------------------------------------------------
scoring:
  method: fd_tvs
  weights:
    # REMOVED: has_nba — folded into nba_primary (2026-04-12), weight redistributed
    nba_primary: 0.35
    cross_sell_count: 0.20
    churn_signal: 0.25
    product_stability: 0.20
    # engagement_score removed (deterministic leakage) — redistribute weight as needed
    # engagement_score: 0.10
  dna_modifier:
    segment_weights:
      "01-TOP": 1.3
      "02-PARTICULARES": 1.0
      "03-UNIVERSITARIO": 0.8
      "UNKNOWN": 0.7
  fatigue:
    decay_rate: 0.85
    max_messages_7d: 5
  risk_penalty:
    max_churn_prob: 0.6
    min_score: 0.05

# ---------------------------------------------------------------------------
# Constraints — filtering and eligibility
# ---------------------------------------------------------------------------
constraints:
  filters:
    - type: fatigue
      max_messages_7d: 5
    - type: eligibility
      min_score: 0.05
      max_churn_prob: 0.6
    - type: owned_product
      check_column_prefix: "prod_"

  product_eligibility:
    # From item_universe.yaml tiers
    standard:
      min_tenure_months: 3
    growth:
      min_tenure_months: 6
    premium:
      min_tenure_months: 12

  top_k:
    k: 5
    diversity_method: mmr
    diversity_lambda: 0.5

# ---------------------------------------------------------------------------
# Cold Start — customers with no/minimal transaction history
# ---------------------------------------------------------------------------
# Customers with fewer than min_txn_count transactions are flagged as cold
# start.  Sequence-derived features (HMM, Mamba, TDA local) are zeroed out
# because they carry no meaningful signal without history.  Demographic,
# product, and global-aggregate features are preserved.
cold_start:
  seq_col: txn_amount_seq            # LIST column used to measure history depth
  min_txn_count: 3                   # <= this count → cold start
  zero_features_prefix:              # generated feature prefixes to zero out
    - hmm_states
    - mamba_temporal
    - tda_local
  keep_features_prefix:              # preserved for cold start (documentation)
    - prod_
    - synth_
    - tda_global
    - gmm_
    - graph_

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
data:
  source: s3://aiops-ple-financial/data/santander/santander_final.parquet
  s3_path: s3://aiops-ple-financial/data/santander/
  id_col: customer_id
  backend: [cudf, duckdb, pandas]
  format: parquet
  total_rows: 941132
  train_split: 0.7
  val_split: 0.15

  # ---- Temporal split (leakage prevention) ----
  # Use time-based split instead of random split to prevent temporal leakage.
  # Monthly snapshots (17 dates, 2015-01 to 2016-05).
  # gap_days=30 ensures no overlap between adjacent monthly snapshots.
  temporal_split:
    enabled: true
    date_col: snapshot_date
    gap_days: 30
    train_ratio: 0.7
    val_ratio: 0.15

  # ---- Per-task validation split strategy ----
  # All tasks share the same training set (random or temporal split).
  # Validation uses task-appropriate subsets based on temporal characteristics:
  #   random          — full val set (for cross-sectional/state tasks)
  #   temporal_latest — only rows from latest snapshot_date in val set
  #                     (for future-action and sequence-prediction tasks)
  split_strategy:
    state_tasks:
      # REMOVED from list: tenure_stage, spend_level, income_tier, engagement_score
      # (all 4 were deterministic-leakage tasks removed 2026-04-10)
      tasks: [churn_signal, product_stability, segment_prediction]
      val_method: random
    future_tasks:
      tasks: [nba_primary, will_acquire_deposits, will_acquire_investments,
              will_acquire_accounts, will_acquire_lending, will_acquire_payments, cross_sell_count]
      val_method: temporal_latest
    sequence_tasks:
      tasks: [next_mcc, mcc_diversity_trend, top_mcc_shift]
      val_method: temporal_latest

  preprocessing:
    fit_subsample_limit: 10000  # ablation: 10K sufficient for encoder fitting (production: 50K)
    # income: 25.4% missing (value=0 means missing) -- impute with median
    income:
      null_indicator: 0
      null_rate: 0.254
      strategy: median
    # tenure_months: -999999 sentinel for unknown
    tenure_months:
      sentinel: -999999
      strategy: clip_and_flag
      clip_min: 0
      clip_max: 256
      flag_col: tenure_unknown
    # ---- Leakage prevention ----
    # Recompute prod_* columns from seq_* month 16 state (not month 17).
    # Validate after split that no temporal information leaks across splits.
    leakage_prevention:
      recompute_prod_from_seq: true   # Recompute prod_* from seq month 16
      validate_after_split: true      # Run LeakageValidator after train/val split

# ---------------------------------------------------------------------------
# Features
# ---------------------------------------------------------------------------
features:
  id_cols: [customer_id]
  meta_cols: [snapshot_date]
  input_dim: 512

  # Categorical columns requiring embedding
  categorical:
    - name: gender
      cardinality: 2           # F, M
      embedding_dim: 4
    - name: segment
      cardinality: 4           # 01-TOP, 02-PARTICULARES, 03-UNIVERSITARIO, UNKNOWN
      embedding_dim: 4
    - name: country
      cardinality: 118         # 118 countries (ES 96%)
      embedding_dim: 16
    - name: channel
      cardinality: 163         # 163 channel codes
      embedding_dim: 16
    - name: age_group
      cardinality: 5           # young, adult, middle, senior, elderly
      embedding_dim: 4
    - name: income_group
      cardinality: 5           # low, mid, high, very_high, unknown
      embedding_dim: 4

  # Numeric columns (continuous)
  numeric:
    - age                      # 18-100
    - income                   # 0-28.8M EUR (25.4% missing/zero)
    - tenure_months            # -999999~256 (sentinel needs handling)
    - is_active                # 0/1 (42% active)
    - num_products             # 0-15 (avg 1.3)

# ---------------------------------------------------------------------------
# Model -- PLE architecture with 7 shared experts
# ---------------------------------------------------------------------------
model:
  architecture: ple

  expert_basket:
    shared:
      - deepfm
      - temporal_ensemble
      - hgcn
      - perslay
      - causal
      - lightgcn
      - optimal_transport
    task: [mlp]

  # expert_input_dims: derived dynamically from feature_schema.json group_ranges
  # (no hardcoding per CLAUDE.md §1.1)

  expert_config:
    deepfm:
      embedding_dim: 16
      hidden_dims: [256, 128, 64]
      dropout: 0.2
      field_dims: auto  # derive from feature_group_ranges
    temporal_ensemble:
      mamba_d_model: 64
      mamba_n_layers: 2
      transformer_n_heads: 4
      transformer_n_layers: 2
      lnn_hidden_dim: 64
    hgcn:
      hyperbolic_dim: 20
      product_dim: 24
      refine_hidden: 128
    perslay:
      phi_hidden_dim: 64
      rho_hidden_dim: 64
    causal:
      dag_hidden_dims: [128, 64]
      lambda_dag: 0.01
    lightgcn:
      embedding_dim: 64
      n_layers: 3
    optimal_transport:
      hidden_dims: [128, 64]
      sinkhorn_iterations: 10
    mlp:
      hidden_dims: [128, 64]
      dropout: 0.2

  cgc:
    dim_normalize: true

  ple:
    num_layers: 3
    extraction_dim: 64
    num_shared_experts: 7
    num_task_experts: 1

  evidential:
    enabled: true
    kl_lambda: 0.01
    annealing_epochs: 10

  sae:
    enabled: true
    weight: 0.01
    expansion_factor: 4
    l1_lambda: 0.001

  loss_weighting:
    strategy: uncertainty

  # GroupEncoder + ClusterEmbedding architecture (v3.2 on-prem design)
  # 4 group encoders shared across 18 tasks -> 88% param reduction
  group_task_expert:
    enabled: true
    group_hidden: 128
    group_output: 64
    cluster_embed_dim: 32

  # HMM triple-mode -> task group routing
  # Each task group receives its mode-specific HMM features as residual
  # journey (8D): product adoption stages
  # lifecycle (8D): customer lifecycle phases
  # behavior (9D): short-term behavioural patterns
  hmm_group_mode_map:
    engagement: behavior
    lifecycle: lifecycle
    value: journey
    consumption: journey

  # Multidisciplinary feature routing: 24D -> 4 x 6D per task group
  # chemical_kinetics -> value, epidemic_diffusion -> lifecycle,
  # crime_pattern -> engagement, interference -> consumption
  multidisciplinary_routing:
    engagement: [0, 1, 2, 3, 4, 5]        # chemical_kinetics
    lifecycle: [6, 7, 8, 9, 10, 11]        # epidemic_diffusion
    value: [12, 13, 14, 15, 16, 17]        # crime_pattern
    consumption: [18, 19, 20, 21, 22, 23]  # interference

  task_tower:
    default_dims: [64, 32]
    dropout: 0.1

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
training:
  experiment_name: santander_ple
  batch_size: 2048             # 941K users / 2048 = ~460 steps/epoch
  epochs: 50
  learning_rate: 0.0005
  weight_decay: 0.01
  gradient_clip_norm: 5.0
  seed: 42
  phase1:
    epochs: 15
    description: "shared expert learning"
  phase2:
    epochs: 8
    freeze_shared: true
    description: "task head fine-tuning"
  early_stopping:
    patience: 7
    metric: val_loss
  scheduler:
    type: cosine
    warmup_epochs: 3
  amp:
    enabled: true
    grad_scaler_init_scale: 1024.0
    grad_scaler_growth_factor: 2.0
    grad_scaler_backoff_factor: 0.5
    grad_scaler_growth_interval: 2000
    grad_scaler_max_scale: 4096.0    # cap to prevent FP16 overflow in multi-task

# ---------------------------------------------------------------------------
# Distillation
# ---------------------------------------------------------------------------
distillation:
  temperature: 1.0  # T=1: use teacher probabilities as-is (no temperature scaling for LGBM student)
  alpha: 0.3        # hard label weight (1-alpha = soft label weight)

  # LGBM student hyperparameters (shared default)
  lgbm:
    num_leaves: 127
    learning_rate: 0.05
    n_estimators: 500
    min_child_samples: 50
    subsample: 0.8
    colsample_bytree: 0.8

  # Per-task LGBM overrides (merged with lgbm defaults above)
  task_lgbm_overrides:
    cross_sell_count:
      objective: huber       # Huber instead of L2 — robust to outliers (RMSE gap 0.176 fix)
      alpha: 0.9             # Huber delta parameter
    mcc_diversity_trend:
      objective: huber
      alpha: 0.9
    product_stability:
      objective: huber
      alpha: 0.9

  # Teacher threshold gating — tasks below 2x random baseline
  # are routed to direct hard-label LGBM training (MRM safeguard)
  teacher_threshold:
    binary_min_auc: 0.60          # AUC > 0.60 (random = 0.50, 2x = N/A for AUC)
    multiclass_min_f1_ratio: 2.0  # F1 > 2/K (K = num_classes)
    regression_min_r2: 0.05       # R2 > 0.05

  # Calibration — Platt scaling for tasks that need accurate probability values
  # Tasks not listed here skip calibration (ranking-only usage)
  calibration:
    enabled: true
    method: platt       # platt | isotonic
    tasks:
      - churn_signal          # 이탈 확률 → 리텐션 예산 배분 기준
      - product_stability     # 안정성 점수 → 이탈 위험 등급 산정
      - cross_sell_count      # 예상 교차판매 수 → 목표 대비 gap 계산

  # Fidelity validation thresholds (per task type)
  fidelity:
    binary:
      max_auc_gap: 0.05
      min_agreement: 0.85
      max_jsd: 0.10
      min_ranking_corr: 0.90
      max_calibration_gap: 0.05  # only checked for calibration.tasks
    multiclass:
      min_agreement: 0.70
      max_jsd: 0.10
      max_f1_macro_gap: 0.10
    regression:
      min_ranking_corr: 0.90
      min_quartile_agreement: 0.70
      max_mae_gap: 0.05
      max_rmse_gap: 0.10

  # IG-based dual-objective feature selection (Paper 2 core contribution)
  feature_selection:
    method: ig_dual                 # ig_dual | lgbm_gain | both
    ig_alpha: 0.7                   # predictive vs explanation weight (Paper 2 default)
    top_k: null                     # null = use cumulative_threshold instead
    cumulative_threshold: 0.95      # keep features covering 95% cumulative importance
    ig_sample_size: 10000           # samples for IG computation (subset for speed)

  # Temporal drift monitoring — SR 11-7 MRM safeguard for daily re-distillation.
  # Compares current student predictions against the previous baseline.
  # Alerts are logged as WARNING (non-blocking); MRM team reviews flagged runs.
  drift_monitoring:
    enabled: true
    max_psi: 0.20                # Population Stability Index threshold (>0.20 = significant shift)
    max_jsd: 0.10                # Jensen-Shannon Divergence threshold
    max_auc_shift: 0.05          # |current_AUC - previous_AUC| (binary tasks only)
    max_prediction_shift: 0.10   # |mean(current) - mean(previous)| absolute shift
    min_rank_correlation: 0.95   # Spearman rho between version rankings
    baseline_path: outputs/distillation_baseline/  # directory for saved .npz baselines

# ---------------------------------------------------------------------------
# Ablation Scenarios
# ---------------------------------------------------------------------------
ablation:
  # Feature and expert scenarios: "auto" = dynamically generated from
  # feature_groups.yaml and model.expert_basket respectively.
  # Set to a list of dicts to override with explicit scenarios.
  feature_scenarios: auto
  expert_scenarios: auto

  # Base feature groups: groups that are NOT removed in the "base_only" scenario.
  # All other groups (from feature_groups.yaml) are considered "advanced/generated".
  base_groups: [demographics, product_holdings]

  # Task tiers for Phase 3: task-scale ablation
  # NOTE: tasks_8/tasks_15/tasks_18 renamed to tasks_6/tasks_11/tasks_14 because
  # 4 deterministic-leakage tasks were removed (tenure_stage, spend_level,
  # engagement_score, income_tier). Old tier names kept as comments for reference.
  # Task tiers updated 2026-04-12: has_nba folded into nba_primary (18→14→13)
  task_tiers:
    tasks_3:  # was tasks_4; removed has_nba
      - churn_signal
      - product_stability
      - nba_primary
    tasks_5:  # was tasks_6; removed has_nba
      - churn_signal
      - product_stability
      - nba_primary
      - cross_sell_count
      - segment_prediction
    tasks_10:  # was tasks_11; removed has_nba
      - churn_signal
      - product_stability
      - nba_primary
      - cross_sell_count
      - will_acquire_deposits
      - will_acquire_investments
      - will_acquire_accounts
      - will_acquire_lending
      - will_acquire_payments
      - segment_prediction
    tasks_13:  # was tasks_14; removed has_nba — this is the full task set
      - churn_signal
      - product_stability
      - nba_primary
      - cross_sell_count
      - will_acquire_deposits
      - will_acquire_investments
      - will_acquire_accounts
      - will_acquire_lending
      - will_acquire_payments
      - segment_prediction
      - next_mcc
      - mcc_diversity_trend
      - top_mcc_shift

  # Structure variants for Phase 3: architecture ablation
  # AMP and LR overrides removed — all variants use script defaults
  # (BASE_HPS.amp=true, learning_rate=0.0005) for fair 20-epoch comparison.
  structure_variants:
    shared_bottom:
      use_ple: false
      use_adatt: false
    ple_softmax:
      use_ple: true
      use_adatt: false
    ple_sigmoid:
      use_ple: true
      use_adatt: false
    adatt_only:
      use_ple: false
      use_adatt: true
    ple_softmax_adatt:
      use_ple: true
      use_adatt: true
    ple_sigmoid_adatt:
      use_ple: true
      use_adatt: true

  # Budget limit (USD) for cost guard — ablation stops if exceeded
  budget_limit: 80.0

  # Default training hyperparameters for all ablation phases (read once by script)
  training_defaults:
    epochs: 5
    batch_size: 5632
    learning_rate: 0.0005
    amp: true
    gradient_accumulation_steps: 1
    early_stopping_patience: 3
    seed: 42
    num_workers: 2
    pin_memory: true
    drop_last: true

  hyperparams:
    learning_rate: [0.0001, 0.0005, 0.001, 0.005]
    temperature: [1.0, 3.0, 5.0, 10.0]
    num_layers: [1, 2, 3]
    extraction_dim: [32, 64, 128]

# ---------------------------------------------------------------------------
# Evaluation metrics per task type
# ---------------------------------------------------------------------------
evaluation:
  binary:
    metrics: [auc_roc, auc_pr, f1, precision, recall, accuracy, log_loss]
    primary: auc_roc
  multiclass:
    metrics: [accuracy, f1_macro, f1_weighted, top_k_accuracy]
    primary: f1_macro
  regression:
    metrics: [rmse, mae, r2, mape]
    primary: rmse

# ---------------------------------------------------------------------------
# Model Analysis (Stage 8.5: IG attribution + Expert Redundancy CCA)
# ---------------------------------------------------------------------------
analysis:
  enabled: true
  ig_steps: 20
  integrated_gradients:
    n_steps: 50
    baseline: zeros
    max_batches: 50
  expert_redundancy:
    enabled: true
    max_batches: 20
    n_components: 10
    min_samples: 256
  xai_quality:
    enabled: true
  model_card:
    enabled: true

# ---------------------------------------------------------------------------
# Serving Preparation (Stage 9.5: context vector store + reason generation)
# ---------------------------------------------------------------------------
serving_prep:
  enabled: false  # Disabled for ablation, enabled for production
  context_store:
    backend: auto  # lancedb or numpy
    embedding_source: feature_pipeline  # use feature pipeline output as vectors
  reason_generation:
    l1_batch: true
    l2a_rewrite: false  # requires LLM
    l2b_validation: true

# ---------------------------------------------------------------------------
# AWS / SageMaker configuration
# ---------------------------------------------------------------------------
aws:
  region: ap-northeast-2
  s3_bucket: aiops-ple-financial
  instance_type: ml.g4dn.xlarge
  cpu_instance_type: ml.m5.2xlarge  # 32GB RAM for Phase 0 (processing jobs)
  use_spot: true
  max_run_seconds: 43200
  role_arn: arn:aws:iam::795833413857:role/AWSPLEPlatformSageMakerRole
