# =============================================================================
# Common Pipeline Configuration — AIOps PLE Platform
# =============================================================================
# PURPOSE: Dataset-agnostic defaults for model architecture, training,
#          distillation, and AWS infrastructure.
#
# USAGE:
#   - This file is loaded first by PipelineRunner / train.py.
#   - A dataset-specific file (configs/datasets/<name>.yaml) is loaded
#     second and its keys are merged (dataset keys win on collision).
#   - Do NOT put dataset-specific task lists, label derivations, or
#     adapter settings here.  Those belong in configs/datasets/<name>.yaml.
#
# ADDING A NEW DATASET:
#   1. Copy configs/datasets/example.yaml → configs/datasets/your_dataset.yaml
#   2. Fill in tasks, labels, adapter, data.source, features, etc.
#   3. Pass --dataset your_dataset to train.py / orchestrator.
#   No changes to this file are needed.
# =============================================================================

# ---------------------------------------------------------------------------
# Model -- PLE architecture defaults (7 shared experts)
# ---------------------------------------------------------------------------
model:
  architecture: ple

  expert_basket:
    shared:
      - deepfm
      - temporal_ensemble
      - hgcn
      - perslay
      - causal
      - lightgcn
      - optimal_transport
    task: [mlp]

  # expert_input_dims: derived dynamically from feature_schema.json group_ranges
  # (no hardcoding per CLAUDE.md §1.1)

  expert_config:
    deepfm:
      embedding_dim: 16
      hidden_dims: [256, 128, 64]
      dropout: 0.2
      field_dims: auto        # derive from feature_group_ranges
    temporal_ensemble:
      mamba_d_model: 64
      mamba_n_layers: 2
      transformer_n_heads: 4
      transformer_n_layers: 2
      lnn_hidden_dim: 64
    hgcn:
      hyperbolic_dim: 20
      product_dim: 24
      refine_hidden: 128
    perslay:
      phi_hidden_dim: 64
      rho_hidden_dim: 64
    causal:
      dag_hidden_dims: [128, 64]
      lambda_dag: 0.01
      # NOTEARS reconstruction loss weight. Without this, the residual
      # SCM design `z_hat = z + z @ W^2` lets the task loss bypass W
      # entirely and W collapses to zero (verified empirically on all
      # pre-patch checkpoints). Restoring ||z - z W^2||^2 as in the
      # original NOTEARS paper gives W a load-bearing gradient path.
      recon_lambda: 0.5
      # CEH (Paper 3 Axis-3 A) — per-prediction attribution head on
      # causal expert. Training-time regulariser aligning attribution
      # with gradient × input of causal output. Primary prediction path
      # unchanged. Off by default; enable via HP `use_ceh=true`.
      ceh:
        enabled: false
        hidden_dim: 64
        loss_weight: 0.1
        dropout: 0.1
    lightgcn:
      embedding_dim: 64
      n_layers: 3
    optimal_transport:
      hidden_dims: [128, 64]
      sinkhorn_iterations: 10
    mlp:
      hidden_dims: [128, 64]
      dropout: 0.2

  cgc:
    dim_normalize: true

  ple:
    num_layers: 3
    extraction_dim: 64
    num_shared_experts: 7
    num_task_experts: 1

  evidential:
    enabled: true
    kl_lambda: 0.01
    annealing_epochs: 10

  sae:
    enabled: true
    weight: 0.01
    expansion_factor: 4
    l1_lambda: 0.001

  loss_weighting:
    strategy: uncertainty   # uncertainty | fixed | none

  # GroupEncoder + ClusterEmbedding architecture (v3.2 on-prem design)
  # Shared group encoders → ~88% param reduction vs per-task heads
  group_task_expert:
    enabled: true
    group_hidden: 128
    group_output: 64
    cluster_embed_dim: 32

  task_tower:
    default_dims: [64, 32]
    dropout: 0.1

# ---------------------------------------------------------------------------
# adaTT — task affinity transfer (inter/intra group, loss-level TAG + GradNorm variant)
# ---------------------------------------------------------------------------
adatt:
  transfer_lambda: 0.1
  temperature: 1.0
  warmup_epochs: 3          # measure affinity before enabling transfer
  freeze_epoch: 8           # freeze transfer weights for stable fine-tuning
  grad_interval: 10         # extract gradients every N steps
  inter_group_strength: 0.3

# ---------------------------------------------------------------------------
# AdaTT-sp (Li et al., KDD 2023) — representation-level fusion at the CGC gate.
# When enabled, the per-task CGC fusion adds the task's own task-specific
# experts' mean output as a learnable-scalar residual on top of the gated
# weighted sum. Unlike the `adatt:` block above (which controls loss-level
# transfer), this modifies the CGC gate itself. Off by default.
# ---------------------------------------------------------------------------
adatt_sp:
  enabled: false                    # toggle via HP override in ablation scenarios
  native_residual_weight_init: 1.0  # learnable scalar initial value

# ---------------------------------------------------------------------------
# Residual recovery (Paper 3) — intra-task recovery of signal from experts
# *not* selected by the CGC gate. Unlike adatt_sp (which preserves the task's
# own task-specific expert output) or loss-level adaTT (which mixes task
# losses across tasks), residual_recovery reclaims under-weighted experts'
# output within the same task's forward, without any cross-task mixing.
#
# Mutually exclusive with adatt_sp at the CGC gate layer. Off by default.
# ---------------------------------------------------------------------------
residual_recovery:
  enabled: false                    # toggle via HP override
  method: "complement"              # complement | orthogonal | dualgate (future)
  weight_init: 0.5                  # learnable residual weight initial value

# ---------------------------------------------------------------------------
# ECEB (Paper 3 MV) — Error-Conditioned Expert Bank.
# Uncertainty-conditioned residual: recovery path is a task-agnostic
# consensus (mean over all experts), scaled at forward time by the gate's
# normalised entropy per sample. Rationale: the three gate-derived residual
# mechanisms (loss-level adaTT, AdaTT-sp, residual_complement) all failed
# because their residual definitions depended on the gate output itself.
# ECEB decouples the residual by conditioning on uncertainty, not on the
# gate's inverse.
#
# Mutually exclusive with adatt_sp and residual_recovery at the CGC gate
# layer. Off by default.
# ---------------------------------------------------------------------------
eceb:
  enabled: false                    # toggle via HP override
  uncertainty_source: "gate_entropy"  # gate_entropy (only option in MV)
  recovery_source: "uniform"        # uniform (mean over experts)
  weight_init: 0.0                  # sigmoid(0)=0.5 → balanced start

# ---------------------------------------------------------------------------
# BRP (Paper 3 MV) — Boosting-Residual Path.
# Single-stage boosting at the output prediction level. A per-task residual
# expert bank takes the last CGC layer's shared_concat as a gate-bypass
# feature view and produces per-task logit residuals matching each primary
# tower's output shape. The residual expert is trained on the primary's
# detached prediction error (MSE on target - sigmoid(primary).detach()),
# keeping the primary's gradient isolated from the residual signal.
# Inference and evaluation use the combined output
# primary + sigmoid(λ_t) × residual so metrics reflect the ensemble.
#
# Unlike the four prior recovery mechanisms (adaTT, AdaTT-sp, M1
# complement, ECEB), BRP does NOT add anything to the primary
# representation — the residual lives in output space. Mutually exclusive
# with adatt_sp / residual_recovery / eceb at the model level. Off by
# default.
# ---------------------------------------------------------------------------
brp:
  enabled: false                    # toggle via HP override
  residual_hidden_dims: [128, 64]   # residual expert MLP widths
  residual_weight_init: -2.0        # sigmoid(-2)≈0.12: residual starts suppressed
  residual_loss_weight: 0.1         # weight of residual-error MSE in total loss
  dropout: 0.1                      # residual expert dropout
  detach_input: false               # when true, shared_concat.detach() before
                                    # feeding residual bank (isolates shared
                                    # experts from residual-MSE gradient).

# ---------------------------------------------------------------------------
# NEAS (Paper 3 follow-up) — Neglected-Expert Auxiliary Supervision.
# Auxiliary training-time regulariser. Per task, an auxiliary MLP head
# consumes the inverse-gate-weighted aggregation of the last CGC layer's
# expert outputs (experts the gate de-emphasised) and is trained against
# the primary target. Forces neglected experts to maintain useful
# representations even under gate concentration, mitigating expert
# collapse. Training only — inference uses the primary path alone. Can be
# combined with BRP / adatt_sp / residual_recovery / eceb.
# ---------------------------------------------------------------------------
neas:
  enabled: false                    # toggle via HP override
  aux_weight: 0.05                  # weight of aux loss in total loss
  aux_hidden_dims: [128, 64]        # aux head MLP widths
  dropout: 0.1                      # aux head dropout

# ---------------------------------------------------------------------------
# Gradient Surgery — PCGrad task-type projection (alternative to adaTT)
# ---------------------------------------------------------------------------
grad_surgery:
  enabled: false            # toggle via HP override in ablation scenarios
  conflict_threshold: 0.0   # project when cos(g_i, g_j) < this value
  warmup_epochs: 3          # match adaTT warmup for fair comparison
  grad_interval: 10         # match adaTT grad_interval for fair comparison
  ema_decay: 0.9
  log_interval: 1
  # task_type_groups: defined in dataset yaml (task names are dataset-specific)

# ---------------------------------------------------------------------------
# Training defaults
# ---------------------------------------------------------------------------
training:
  experiment_name: ple_experiment
  batch_size: 2048
  epochs: 50
  learning_rate: 0.0005
  weight_decay: 0.01
  gradient_clip_norm: 5.0
  seed: 42
  phase1:
    epochs: 15
    description: "shared expert learning"
  phase2:
    epochs: 8
    freeze_shared: true
    description: "task head fine-tuning"
  early_stopping:
    patience: 7
    metric: val_loss
  scheduler:
    type: cosine
    warmup_epochs: 3
  amp:
    enabled: true
    grad_scaler_init_scale: 1024.0
    grad_scaler_growth_factor: 2.0
    grad_scaler_backoff_factor: 0.5
    grad_scaler_growth_interval: 2000
    grad_scaler_max_scale: 4096.0   # cap to prevent FP16 overflow in multi-task

# ---------------------------------------------------------------------------
# Distillation — PLE teacher → LGBM student knowledge distillation
# ---------------------------------------------------------------------------
distillation:
  temperature: 1.0    # T=1: use teacher probabilities as-is (no scaling for LGBM student)
  alpha: 0.3          # hard label weight; (1 - alpha) = soft label weight

  # LGBM student hyperparameters (shared default across all tasks)
  lgbm:
    num_leaves: 127
    learning_rate: 0.05
    n_estimators: 500
    min_child_samples: 50
    subsample: 0.8
    colsample_bytree: 0.8

  # Per-task LGBM overrides — merged with lgbm defaults above.
  # Dataset yamls may define their own task_lgbm_overrides.
  task_lgbm_overrides: {}

  # Teacher threshold gating — tasks below 2x random baseline
  # are routed to direct hard-label LGBM training (MRM safeguard)
  teacher_threshold:
    # Distill vs Direct boundary (2x random baseline)
    binary_min_auc: 0.60           # AUC > 0.60 → distill, else direct
    multiclass_min_f1_ratio: 2.0   # F1 > 2/K → distill, else direct
    regression_min_r2: 0.05        # R2 > 0.05 → distill, else direct
    # Floor: below this → SKIP LGBM entirely (Layer 3 rule-only)
    # Saves compute when teacher is at/below random — no point training LGBM
    floor_binary_auc: 0.52
    floor_multiclass_f1_ratio: 1.0   # F1 <= 1/K means random or worse
    floor_regression_r2: 0.01

  # Calibration — Platt scaling for tasks requiring accurate probabilities
  calibration:
    enabled: true
    method: platt       # platt | isotonic
    tasks: []           # populated in dataset yaml

  # Fidelity validation thresholds (per task type)
  fidelity:
    binary:
      max_auc_gap: 0.05
      min_agreement: 0.85
      max_jsd: 0.10
      min_ranking_corr: 0.90
      max_calibration_gap: 0.05   # checked only for calibration.tasks
    multiclass:
      min_agreement: 0.70
      max_jsd: 0.10
      max_f1_macro_gap: 0.10
    regression:
      min_ranking_corr: 0.90
      min_quartile_agreement: 0.70
      max_mae_gap: 0.05
      max_rmse_gap: 0.10

  # Feature selection — LGBM gain importance from student model
  # Teacher IG is reserved for offline analysis / reason pipeline (not distillation)
  feature_selection:
    method: lgbm_gain             # lgbm_gain (distillation), ig_dual (offline only)
    top_k: null                   # null = use cumulative_threshold instead
    cumulative_threshold: 0.95    # keep features covering 95% cumulative importance

  # Temporal drift monitoring — SR 11-7 MRM safeguard for daily re-distillation
  drift_monitoring:
    enabled: true
    max_psi: 0.20                 # Population Stability Index threshold
    max_jsd: 0.10                 # Jensen-Shannon Divergence threshold
    max_auc_shift: 0.05           # |current_AUC - previous_AUC| (binary tasks only)
    max_prediction_shift: 0.10    # |mean(current) - mean(previous)| absolute shift
    min_rank_correlation: 0.95    # Spearman rho between version rankings
    baseline_path: outputs/distillation_baseline/

  # Feature-level PSI drift (Step 4.6 in distillation pipeline)
  feature_drift:
    enabled: true
    baseline_path: outputs/distillation_baseline/feature_baseline.json
    psi_threshold_warning: 0.1    # PSI >= 0.1 triggers a warning
    psi_threshold_critical: 0.25  # PSI >= 0.25 triggers a critical alert

# ---------------------------------------------------------------------------
# Monitoring — fairness, drift, incident, governance thresholds
# (mirrors configs/monitoring.yaml — this is the authoritative source for
#  code; monitoring.yaml is kept as a human-readable reference only)
# ---------------------------------------------------------------------------
monitoring:
  fairness:
    thresholds:
      di_lower: 0.8
      di_upper: 1.25
      spd_max: 0.1
      eod_max: 0.1
    auto_incident: true

  drift:
    psi_warning: 0.1
    psi_critical: 0.25
    n_bins: 10

  incidents:
    severity_thresholds:
      critical:
        - kill_switch_activation
        - di_below_0.6
        - security_breach
      major:
        - di_below_0.8
        - herding_critical
        - model_rollback
        - consecutive_drift_retrain
      minor:
        - drift_warning
        - quality_drop
        - herding_high
        - single_feature_critical

  governance_report:
    enabled: true
    frequency: weekly

# ---------------------------------------------------------------------------
# Evaluation metrics per task type (shared across all datasets)
# ---------------------------------------------------------------------------
evaluation:
  binary:
    metrics: [auc_roc, auc_pr, f1, precision, recall, accuracy, log_loss]
    primary: auc_roc
  multiclass:
    metrics: [accuracy, f1_macro, f1_weighted, top_k_accuracy]
    primary: f1_macro
  regression:
    metrics: [rmse, mae, r2, mape]
    primary: rmse

# ---------------------------------------------------------------------------
# Analysis — IG attribution + Expert Redundancy CCA (Stage 8.5)
# ---------------------------------------------------------------------------
analysis:
  enabled: true
  ig_steps: 20
  integrated_gradients:
    n_steps: 50
    baseline: zeros
    max_batches: 50
  expert_redundancy:
    enabled: true
    max_batches: 20
    n_components: 10
    min_samples: 256
  xai_quality:
    enabled: true
  model_card:
    enabled: true

# ---------------------------------------------------------------------------
# LLM Provider — for L2a reason rewrite + L2b quality validation
# ---------------------------------------------------------------------------
llm_provider:
  backend: bedrock              # bedrock | openai | gemini | solar | dummy
  bedrock:
    region: ap-northeast-2      # Seoul region (same as SageMaker)
    # Per-agent model assignment (Bedrock only)
    models:
      reason_generation:        # L2a — customer-facing reason rewrite
        model_id: global.anthropic.claude-sonnet-4-6
        max_tokens: 500
        temperature: 0.3
      reason_critique:          # L2a self-critique
        model_id: global.anthropic.claude-sonnet-4-6
        max_tokens: 500
        temperature: 0.2
      factuality_check:         # Agent 3 SelfChecker — fast factuality
        model_id: global.anthropic.claude-haiku-4-5-20251001-v1:0
        max_tokens: 300
        temperature: 0.0
      agent_dialog:             # Ops/Audit inter-agent dialog
        model_id: global.anthropic.claude-sonnet-4-6
        max_tokens: 2000
        temperature: 0.1
      agent_consensus:          # Multi-agent consensus (3x parallel)
        model_id: global.anthropic.claude-sonnet-4-6
        max_tokens: 2000
        temperature: 0.1
    # Default fallback
    default:
      model_id: global.anthropic.claude-haiku-4-5-20251001-v1:0
      max_tokens: 500
      temperature: 0.2

# ---------------------------------------------------------------------------
# Reason Generation — 3-agent pipeline (FactExtractor → TemplateEngine → SelfChecker)
# ---------------------------------------------------------------------------
reason:
  fact_extractor:
    config_path: configs/financial/fact_extraction.yaml
  template_engine:
    # task_name -> customer-facing product name
    item_name_map:
      churn_signal: "고객 유지 프로그램"
      will_acquire_deposits: "예적금 상품"
      will_acquire_investments: "투자 상품"
      will_acquire_accounts: "입출금 계좌"
      will_acquire_lending: "대출 상품"
      will_acquire_payments: "결제 서비스"
      top_mcc_shift: "맞춤 소비 혜택"
      product_stability: "자산 안정화 서비스"
      nba_primary: "추천 금융 상품"
      cross_sell_count: "교차판매 상품"
      segment_prediction: "고객 맞춤 서비스"
      next_mcc: "소비 카테고리 추천"
      mcc_diversity_trend: "소비 다양성 혜택"
    feature_category_map:
      # Synthetic / RFM features
      synth_monthly_spend: spending
      synth_monthly_txns: transaction
      synth_frequency: transaction
      synth_recency_days: engagement
      synth_stability: stability
      synth_monetary: spending
      synth_avg_amount: spending
      synth_unique_mcc: consumption
      synth_unique_merchants: consumption
      # HMM lifecycle/behavior features
      hmm_states_journey: lifecycle
      hmm_states_lifecycle: lifecycle
      hmm_states_behavior: behavior
      # Clustering / segmentation
      gmm_clustering: segment
      # Model-derived features
      model_derived_bandit: recommendation
      model_derived_lnn: behavior
      model_derived_gmm: segment
      # Demographics / income
      income: demographics
      age: demographics
      # Engagement indicators
      is_active: engagement
      total_churns: engagement
      # Label-derived features (from Phase 0)
      label_engagement_score: engagement
      label_income_tier: demographics
      label_tenure_stage: lifecycle
      label_segment: segment
      # Product holding features
      prod_: product_holding
      # Sequence features
      seq_: product_holding
      # TDA / graph features
      tda_: topology
      graph_: topology
      # Economics features
      economics_pih: income_stability
    template_pool:
      spending:
        - "고객님의 소비 패턴을 분석한 결과, {item_name}이(가) 적합합니다."
        - "최근 지출 활동을 기반으로 {item_name}을(를) 추천드립니다."
      transaction:
        - "고객님의 거래 빈도를 고려하면 {item_name}이(가) 유용할 수 있습니다."
        - "활발한 거래 패턴에 맞는 {item_name}을(를) 안내드립니다."
      engagement:
        - "고객님의 이용 패턴을 분석하여 {item_name}을(를) 추천드립니다."
      stability:
        - "안정적인 금융 활동 이력에 적합한 {item_name}입니다."
      consumption:
        - "다양한 소비 카테고리를 활용하시는 고객님께 {item_name}을(를) 추천드립니다."
      lifecycle:
        - "현재 금융 라이프사이클 단계에 적합한 {item_name}입니다."
      behavior:
        - "고객님의 금융 행동 패턴에 맞는 {item_name}을(를) 추천드립니다."
      segment:
        - "유사한 고객군에서 높은 만족도를 보인 {item_name}입니다."
      recommendation:
        - "종합 분석 결과, {item_name}을(를) 최우선으로 추천드립니다."
      demographics:
        - "고객님의 재무 프로필에 적합한 {item_name}을(를) 안내드립니다."
        - "고객님의 소득 수준과 재무 상황을 고려하여 {item_name}을(를) 추천드립니다."
      product_holding:
        - "현재 보유하신 금융 상품 구성을 고려하여 {item_name}을(를) 추천드립니다."
        - "기존 상품과의 시너지를 고려한 {item_name} 안내입니다."
      topology:
        - "고객님의 거래 네트워크 분석 결과, {item_name}이(가) 적합합니다."
      income_stability:
        - "소득 안정성을 고려하여 적합한 {item_name}을(를) 안내드립니다."
        - "장기적인 소득 흐름에 맞는 {item_name}입니다."
    task_frames:
      churn_signal:
        positive: "고객님의 소중한 거래 관계를 유지하고자 합니다. {reason}"
        negative: "항상 함께해 주셔서 감사합니다. {reason}"
      will_acquire_deposits:
        positive: "자산 증식에 도움이 될 수 있습니다. {reason}"
      will_acquire_investments:
        positive: "고객님의 재무 목표에 부합할 수 있습니다. {reason}"
      will_acquire_accounts:
        positive: "효율적인 자금 관리에 도움이 됩니다. {reason}"
      will_acquire_lending:
        positive: "현재 자금 수요에 적합한 상품입니다. {reason}"
      will_acquire_payments:
        positive: "간편한 결제 환경을 제공합니다. {reason}"
      top_mcc_shift:
        positive: "소비 패턴의 변화에 맞춘 혜택입니다. {reason}"
      product_stability:
        positive: "안정적인 자산 관리를 위해 추천드립니다. {reason}"
      nba_primary:
        positive: "고객님께 가장 적합한 상품입니다. {reason}"
      cross_sell_count:
        positive: "포트폴리오 확장에 도움이 될 수 있습니다. {reason}"
      segment_prediction:
        positive: "고객님의 금융 니즈에 맞춤 설계된 서비스입니다. {reason}"
      next_mcc:
        positive: "소비 패턴 분석을 기반으로 추천드립니다. {reason}"
      mcc_diversity_trend:
        positive: "다양한 소비 경험을 위한 혜택입니다. {reason}"
  async_orchestrator:
    # SQS queue URL for L2a async rewrite jobs.
    # Leave empty ("") during local development; set to the CloudFormation
    # output "ple-reason-l2a-queue-url-{env}" in production.
    sqs_queue_url: ""
    dynamo_table: reason_cache
  self_checker:
    enable_llm_check: true      # use Bedrock for L2b compliance check
    pii_check: true
    hallucination_check: true
    regulatory_check: true      # 금소법 §17/§19 compliance

# ---------------------------------------------------------------------------
# Serving Preparation (Stage 9.5: context vector store + reason generation)
# ---------------------------------------------------------------------------
serving_prep:
  enabled: false    # Disabled for ablation; enabled for production
  context_store:
    backend: auto   # lancedb (preferred) or numpy (fallback)
    embedding_source: feature_pipeline
    # Local: store_path is a directory
    # AWS: S3 URI — LanceDB natively supports s3:// paths
    store_path: s3://aiops-ple-financial/context_store/
    # store_path: context_store/   # local fallback
  reason_generation:
    l1_batch: true              # L1 template reasons in batch (always)
    l2a_rewrite: true           # L2a LLM rewrite via Bedrock (async, SQS)
    l2b_validation: true        # L2b quality check (PII, hallucination, compliance)
    human_review_sample_rate: 0.05  # 5% sampled for human review

# ---------------------------------------------------------------------------
# Serving — Sprint 3 (M1 review queue, M2 kill switch, M10 item universe)
# ---------------------------------------------------------------------------
serving:
  # M1 Human Review Queue
  review:
    tier_1_sample_rate: 0.05      # 5% post-hoc random sample
    tier_2_review_required: true  # 100% mandatory agent review
    tier_3_human_fallback: true   # mandatory human fallback path
    queue_backend: in_memory      # in_memory | dynamodb
    dynamodb_table: ple-review-queue
    region: ap-northeast-2
    sla_hours: 24

  # M2 Kill Switch (extends existing table-based switch with config)
  kill_switch:
    backend: dynamodb             # dynamodb | in_memory
    table_name: ple-kill-switch
    fallback_strategy: rule_based # rule_based | previous_model | disable
    region: ap-northeast-2

  # M10 Dynamic Item Universe Loader
  item_universe:
    enabled: false                # enable once Parquet tables are provided
    campaign_parquet: s3://aiops-ple-financial/universe/campaigns.parquet
    product_parquet: s3://aiops-ple-financial/universe/products.parquet
    active_statuses: [approved, running]
    cache_ttl_seconds: 3600

  # Sprint 2 S15: Champion-Challenger promotion policy. auto_promote MUST be
  # false in production per EU AI Act Art. 14 (human oversight) and SR 11-7
  # effective-challenge principle. Challenger metrics are logged for review
  # but promotion requires an explicit --force-promote operator action.
  competition:
    auto_promote: false
    primary_metric: avg_auc
    min_improvement: 0.005        # 0.5%
    max_degradation: 0.02         # 2%
    significance_level: 0.05

# ---------------------------------------------------------------------------
# Data — backend preferences and split strategy structure
# ---------------------------------------------------------------------------
data:
  # source / s3_path / id_col / total_rows / temporal_split overrides
  # should be set in the dataset yaml.
  backend: [cudf, duckdb, pandas]   # priority order; cuDF tried first
  format: parquet
  train_split: 0.7
  val_split: 0.15
  preprocessing:
    fit_subsample_limit: 10000      # rows used to fit encoders/scalers

# ---------------------------------------------------------------------------
# Features — common structure (dataset yaml adds id_cols, meta_cols, etc.)
# ---------------------------------------------------------------------------
features:
  input_dim: 512    # overridden by dataset yaml if different

# ---------------------------------------------------------------------------
# AWS / SageMaker configuration
# ---------------------------------------------------------------------------
aws:
  region: ap-northeast-2
  s3_bucket: aiops-ple-financial
  instance_type: ml.g4dn.xlarge
  cpu_instance_type: ml.m5.2xlarge    # Phase 0 processing jobs (CPU only)
  use_spot: true
  max_run_seconds: 43200              # 12 hours
  role_arn: arn:aws:iam::795833413857:role/AWSPLEPlatformSageMakerRole

# ---------------------------------------------------------------------------
# Compliance / Regulatory Foundation (Sprint 0)
# ---------------------------------------------------------------------------
# Backs M1~M12 (onprem → AWS port, see docs/aws_build_plan.md).
# Legal basis:
#   AI기본법 §31 (AI 거부권), §34 (고지), §35 (FRIA 5년 보존)
#   개보법 §22 (동의), §37의2 (자동화 결정 거부권)
#   개보법 시행령 §44의2~4 (설명요구권 10일 SLA)
#   신정법 §36의2 (프로파일링 권리)
#   금소법 §17 (적합성)
# ---------------------------------------------------------------------------
compliance:
  store:
    backend: in_memory                       # in_memory | dynamodb | s3_parquet
    requests_table: ple-compliance-requests  # DynamoDB table name (prod)
    events_table: ple-compliance-events
    s3_bucket: aiops-ple-financial
    s3_prefix: compliance
    region: ap-northeast-2

  retention:
    default_days: 1825       # 5년 (AI기본법 §35 FRIA 보존)
    rights_request_days: 2555  # 7년 (개보법 권리 요청)
    audit_event_days: 2555   # 7년 (감사 이력)

  sla:
    # 10-day SLA per 개보법 시행령 §44의2~4
    explanation_response_days: 10
    explanation_warning_days_before: 2
    # 30-day SLA per 개보법 §37의2 (operator response to opt-out)
    opt_out_response_days: 30
    opt_out_warning_days_before: 5
    # Profiling access/correction/deletion (신정법 §36의2)
    profiling_response_days: 30
    profiling_warning_days_before: 5

  # M3 Consent config (populated in Sprint 1)
  consent:
    channels: [SMS, EMAIL, APP_PUSH, PHONE, MAIL]
    night_hours_kst: [21, 8]    # [start_hour, end_hour_next_day]
    default_retention_days: 365
    dnc_registry_enabled: true

  # M4 Opt-out config (Sprint 1)
  opt_out:
    default_fallback: rule_based    # rule_based | human_review | disable
    explanation_sla_days: 10        # mirrors sla.explanation_response_days

  # M7 FRIA config (Sprint 2)
  fria:
    operator_type: "국가기관등"  # 국가기관등 | 민간
    retention_days: 1825        # 5년
    warning_before_expiry_days: 180
    dimensions:
      - data_sensitivity
      - automation_level
      - scope_of_impact
      - model_complexity
      - external_dependency
      - fairness_risk
      - explainability_gap

  # M9 AI Risk Classifier (Sprint 2)
  ai_risk:
    dimensions:
      data_sensitivity: 0.25
      automation_level: 0.20
      scope_of_impact: 0.20
      model_complexity: 0.15
      external_dependency: 0.10
      fairness_risk: 0.10
    grade_thresholds:
      high: 0.70    # total_score >= 0.70
      medium: 0.40  # total_score >= 0.40

  # M12 LLM marker (Sprint 3)
  llm_marker:
    enabled: true
    marker_text: "※ 본 추천 사유는 AI가 생성하였습니다. (AI기본법 §31)"

  # Sprint 2 promotion gate (layered on top of ModelCompetition)
  # Enable once per-model dimension score providers are wired up; until
  # then conservative default 0.5 is used and the gate behaves as a
  # smoke test, not a safety floor.
  promotion_gate:
    enabled: false
    require_approval_on_escalation: true
    default_score: 0.5

  # Sprint 2 S5: SageMaker-native compliance tracking.
  # Replaces the on-premises MLflow+DVC stack with SageMaker Experiments
  # (Trials/TrialComponents) + SageMaker Lineage + S3 versioning. Every
  # regulatory artifact (FRIA result, AI-risk assessment, compliance
  # registry sweep, promotion-gate verdict) is logged as a TrialComponent.
  tracking:
    backend: in_memory             # sagemaker | in_memory
    experiment_name: aiops-ple-financial-compliance
    trial_prefix: compliance-trial
    region: ap-northeast-2
    artifact_s3_prefix: s3://aiops-ple-financial/compliance/artifacts
    display_name_tag: compliance_type

  # Sprint 2 S6: DuckDB-over-Parquet compliance SQL (Athena-free).
  # Paths are registered as DuckDB views; queries run on demand. For
  # s3:// URIs DuckDB's httpfs extension is auto-installed. Preserves
  # the on-premises DuckDB experience without adding Athena / Redshift
  # Spectrum costs.
  audit_sql:
    enabled: true
    default_since_days: 30
    install_httpfs: true
    paths:
      opt_out: s3://aiops-ple-financial/compliance/events/dt=*/events_*.parquet
      consent: s3://aiops-ple-financial/compliance/events/dt=*/events_*.parquet
      events: s3://aiops-ple-financial/compliance/events/dt=*/events_*.parquet
      promotion_gate: s3://aiops-ple-financial/compliance/artifacts/promotion_gate/*.parquet

# ---------------------------------------------------------------------------
# Rule Engine — Layer 3 rule-based fallback (ML-free)
# ---------------------------------------------------------------------------
# Activated when PLE distillation (L1) and direct LGBM (L2) both fail or are
# unavailable.  All thresholds configurable here; no values hardcoded in code.
# ---------------------------------------------------------------------------
rule_engine:
  enabled: true
  suitability_check: true    # enforce 금소법 제17조 across every rule

  # Product adjacency path for nba_primary rule (Kotler 5A ordering)
  product_adjacency:
    path: [deposits, savings, investment, insurance, lending]

  # Dormancy early-warning thresholds for product_stability rule
  dormancy_thresholds:
    warning_days: 30       # 주의 (알림 발송)
    alert_days: 60         # 경고 (프로모션 제안)
    dormant_days: 90       # 휴면 예비 (전담 상담 배정)

  # CLV tier targets for cross_sell_count rule (SOW optimisation)
  clv_tiers:
    premium_percentile: 80
    target_products:
      premium:  4          # 상위 20%: 목표 4+ 상품
      stable:   3          # 중위 40-80%: 목표 3 상품
      growth:   2          # 중위 20-40%: 목표 2 상품
      at_risk:  1          # 하위 20%: 기존 상품 활성화 우선

  # RFM decay thresholds for churn_signal rule (Berry 1983)
  rfm_thresholds:
    recency_warning_days: 30
    monetary_drop_pct: 0.20    # 20% monetary decline triggers retention offer

  # MCC distribution shift thresholds for top_mcc_shift rule
  mcc_thresholds:
    jsd_threshold: 0.15    # Jensen-Shannon Divergence threshold
    top_k: 5               # MCC frequency top-K for next_mcc

  # Surplus ratio threshold for will_acquire_deposits rule
  deposits_thresholds:
    surplus_ratio: 0.30    # (balance - spending) / balance > 30%

  # Investment rule thresholds (금소법 제17조 적합성)
  investments_thresholds:
    min_risk_grade: 3          # 공격투자형 이상 (1=보수, 5=공격)
    asset_pct_threshold: 70.0  # 상위 30% 자산 보유자 → 투자 추천

  # Account acquisition thresholds
  accounts_thresholds:
    new_customer_days: 90          # 가입 90일 이내 → 신규 고객
    interbank_transfer_pct: 0.30   # 타행 이체 30%+ → 수수료 우대 계좌 추천
  # Feature prefix for tenure lookup (dataset-specific column name goes here)
  accounts_tenure_feature_prefix: tenure   # matches any feature starting with "tenure"

  # Lending rule thresholds (Altman Z-score extension)
  lending_thresholds:
    max_dti: 0.40              # DTI < 40% required for lending recommendation
    max_credit_grade: 4        # 신용등급 1-4 (1=최우량, 10=최저)
    pih_income_threshold_lending: 3000.0   # permanent income threshold (currency units)

  # Payments / card matching thresholds
  payments_thresholds:
    spend_top_pct: 70.0        # 카드 결제액 상위 30% 기준
    foreign_pct: 0.10          # 해외 결제 비중 10%+ → 해외카드 추천

  # Segment classification thresholds (3-axis rule)
  segment_thresholds:
    balance_high: 50000.0      # 잔액 상위 구간 (currency units)
    balance_mid: 10000.0       # 잔액 중위 구간
    freq_high: 20.0            # 월 거래 건수 고활성
    freq_mid: 5.0              # 월 거래 건수 저활성

  # HMM / Mamba feature thresholds (used when engineered features are present)
  hmm_declining_threshold: 0.50    # HMM lifecycle declining-state probability
  mamba_churn_threshold: 0.50      # Mamba temporal churn probability
  tda_shift_threshold: 0.50        # TDA local topology shift score

  # Per-task suitability product risk grades (0 = no constraint)
  # Matches 금소법 제17조: customer_risk_grade >= product_risk_grade
  product_risk_grades:
    will_acquire_investments: 3    # 공격투자형 이상 필요
    will_acquire_lending: 0        # 신용 기반 (별도 DTI/등급 체크)
    will_acquire_deposits: 0       # 모든 등급 허용
    will_acquire_accounts: 0
    will_acquire_payments: 0
    nba_primary: 0
    churn_signal: 0
    product_stability: 0
    segment_prediction: 0
    cross_sell_count: 0
    next_mcc: 0
    mcc_diversity_trend: 0
    top_mcc_shift: 0
