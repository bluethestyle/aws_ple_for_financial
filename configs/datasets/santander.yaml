# =============================================================================
# Dataset Config: Santander Customer Transactions Benchmark
# =============================================================================
# PURPOSE: All Santander-specific settings — tasks, labels, adapter, sequences,
#          ablation scenarios, scoring, constraints, and data source.
#
# USAGE:
#   Loaded after configs/pipeline.yaml.  Keys here override common defaults.
#   Pass --dataset santander (or dataset: santander) to the runner/train.py.
#
# DATA:
#   941,132 users x 89 raw columns → 403 feature columns after Phase 0
#   13 tasks across 4 tiers  (was 18→14→13; has_nba folded into nba_primary)
#   7 shared experts, temporal split on snapshot_date
#
# HISTORY:
#   2026-04-10  4 deterministic-leakage tasks removed (income_tier,
#               tenure_stage, spend_level, engagement_score)
#   2026-04-12  has_nba folded into nba_primary (class 0 = no NBA)
# =============================================================================

# ---------------------------------------------------------------------------
# Dataset metadata
# ---------------------------------------------------------------------------
dataset:
  name: santander
  description: >
    Santander Customer Transactions benchmark.
    941,132 users, 89 raw columns, 13 tasks, 7 shared experts.
    Pre-aggregated user-level synthetic dataset with product holdings,
    transaction sequences, and demographic attributes.
  total_rows: 941132
  feature_groups_file: configs/santander/feature_groups.yaml

task_name: santander_ple
adapter: santander
feature_groups_file: configs/santander/feature_groups.yaml

# ---------------------------------------------------------------------------
# Tasks — 13 tasks across 4 tiers
# ---------------------------------------------------------------------------
# NOTE: fraud_risk excluded — synth_fraud_ratio is ALL ZERO (useless label)
# NOTE: has_nba folded into nba_primary (class 0 = no NBA, 2026-04-12)
# NOTE: Tier 4 per-product tasks dropped (redundant with Tier 3 groups)
# NOTE: 3 txn-based NBA tasks added (Tier 5)
# NOTE: 4 tasks removed for deterministic leakage (feature → bucket(feature)):
#   income_tier, tenure_stage, spend_level, engagement_score
#   These source features ARE model inputs, so the model trivially reconstructs
#   the label.  Including them produces artificially inflated multi-task metrics.
# ---------------------------------------------------------------------------
tasks:

  # ===== Tier 1 — Core targets (3 tasks) =====

  # REMOVED: has_nba — folded into nba_primary (class 0 = no NBA).
  # Binary "will acquire any product?" is derivable from nba_primary != 0.

  - name: churn_signal
    type: binary
    loss: focal
    loss_params:
      alpha: 0.85
      gamma: 2.0
    loss_weight: 2.0
    label_col: churn_signal
    description: "Churn signal: product count < prior avg x 0.7 (5.1% positive)"

  - name: product_stability
    type: regression
    loss: huber
    loss_weight: 1.5
    label_col: product_stability
    nullable: true
    description: "Product holding stability (1-CV), 0-1, avg 0.92, nullable"

  - name: nba_primary
    type: multiclass
    loss: ce
    loss_weight: 2.0
    label_col: label_nba_primary
    num_classes: 7
    topk_k: [1, 3]
    description: "Next best action — product group to recommend (0=no_nba, 1=savings_guarantee, 2=checking_accounts, 3=deposits, 4=investments, 5=credit_loans, 6=debits)"
    derive:
      method: list_first_group
      source_col: nba_label
      filter_col: has_nba
      default: 0

  # ===== Tier 2 — Derived targets (1 active; 2 removed for leakage) =====

  # REMOVED: tenure_stage — bucket(tenure_months) is a model input; reconstructable.
  # REMOVED: spend_level  — bucket(synth_monthly_spend) is a model input; reconstructable.

  - name: cross_sell_count
    type: regression
    loss: huber
    loss_weight: 1.0
    label_col: label_cross_sell_count
    description: "Number of products in nba_label list (0-24)"
    derive:
      method: len_of_list
      source_col: nba_label

  # REMOVED: engagement_score — weighted_sum of model inputs; trivially reconstructable.

  # ===== Tier 3 — Product group + segmentation (6 tasks) =====
  # NOTE: fraud_risk excluded (synth_fraud_ratio is ALL ZERO)

  - name: will_acquire_deposits
    type: binary
    loss: focal
    loss_params:
      alpha: 0.95
      gamma: 2.0
    loss_weight: 1.5
    label_col: label_acquire_deposits
    description: "Any of nba_label indices [8,9,10] (short/medium/long deposit)"
    derive:
      method: nba_group_check
      source_col: nba_label
      indices: [8, 9, 10]

  - name: will_acquire_investments
    type: binary
    loss: focal
    loss_params:
      alpha: 0.90
      gamma: 2.0
    loss_weight: 1.5
    label_col: label_acquire_investments
    description: "Any of nba_label indices [12,18] (funds, securities)"
    derive:
      method: nba_group_check
      source_col: nba_label
      indices: [12, 18]

  - name: will_acquire_accounts
    type: binary
    loss: focal
    loss_params:
      alpha: 0.85
      gamma: 2.0
    loss_weight: 1.2
    label_col: label_acquire_accounts
    description: "Any of nba_label indices [2,5,6,7,11,19] (checking, junior, particular, e_account, home)"
    derive:
      method: nba_group_check
      source_col: nba_label
      indices: [2, 5, 6, 7, 11, 19]

  - name: will_acquire_lending
    type: binary
    loss: focal
    loss_params:
      alpha: 0.90
      gamma: 2.0
    loss_weight: 1.5
    label_col: label_acquire_lending
    description: "Any of nba_label indices [13,15] (mortgage, loans)"
    derive:
      method: nba_group_check
      source_col: nba_label
      indices: [13, 15]

  - name: will_acquire_payments
    type: binary
    loss: focal
    loss_params:
      alpha: 0.85
      gamma: 2.0
    loss_weight: 1.2
    label_col: label_acquire_payments
    description: "Any of nba_label indices [4,17,20,22,23] (credit_card, direct/auto debit, payroll)"
    derive:
      method: nba_group_check
      source_col: nba_label
      indices: [4, 17, 20, 22, 23]

  - name: segment_prediction
    type: multiclass
    loss: ce
    loss_weight: 1.0
    label_col: label_segment
    num_classes: 4
    description: "Customer segment: 01-TOP=0, 02-PARTICULARES=1, 03-UNIVERSITARIO=2, UNKNOWN=3"
    derive:
      method: string_map
      source_col: segment
      mapping: {"01-TOP": 0, "02-PARTICULARES": 1, "03-UNIVERSITARIO": 2, "UNKNOWN": 3}

  # REMOVED: income_tier — bucket(income) is a model input; reconstructable.

  # ===== Tier 5 — Transaction-based NBA (3 tasks) =====
  # LEAKAGE NOTE (all 3): txn_mcc_seq must be TRUNCATED before feature
  # generation — exclude the last element (use txn_mcc_seq[:-1] as input,
  # txn_mcc_seq[-1] as label).  Truncation is applied BEFORE any generator
  # call and AFTER temporal split.

  - name: next_mcc
    type: multiclass
    loss: ce
    loss_weight: 1.2
    label_col: label_next_mcc
    num_classes: 50
    topk_k: [1, 5, 10]
    description: "Predict next MCC category from txn sequence (top-50 MCCs)"
    derive:
      method: sequence_next
      source_seq: txn_mcc_seq
      top_k: 50

  - name: mcc_diversity_trend
    type: regression
    loss: huber
    loss_weight: 0.8
    label_col: label_mcc_diversity_trend
    description: "MCC diversity trend: change in unique MCC count over recent windows"
    derive:
      method: sequence_diversity_trend
      source_seq: txn_mcc_seq
      window_sizes: [10, 30]

  - name: top_mcc_shift
    type: binary
    loss: focal
    loss_params:
      alpha: 0.70
      gamma: 2.0
    loss_weight: 1.0
    label_col: label_top_mcc_shift
    description: "Did the customer's top MCC category change recently?"
    derive:
      method: sequence_mode_shift
      source_seq: txn_mcc_seq
      window_sizes: [15, 30]

# ---------------------------------------------------------------------------
# Labels — derivation rules mapping raw columns to label columns
# ---------------------------------------------------------------------------
labels:
  # Tier 1: direct from dataset
  # REMOVED: has_nba — folded into nba_primary (2026-04-12)
  churn_signal:
    source: churn_signal
    type: direct
  product_stability:
    source: product_stability
    type: direct
  # Tier 1 derived: nba_primary (7-class, 0=no_nba)
  # group_map mirrors generate_benchmark_data._NBA_GROUP_MAP so the
  # derived label matches the index-to-group assignment used when the
  # synthetic nba_label lists were generated.
  label_nba_primary:
    source: nba_label
    type: list_first_group
    default: 0
    group_map:
      1: [0, 1]                                 # savings_guarantee
      2: [2, 3, 4, 5, 6, 7, 19, 20]             # checking_accounts
      3: [8, 9, 10, 11]                         # deposits
      4: [12, 13, 14]                           # investments
      5: [15, 16, 17, 18]                       # credit_loans
      6: [21, 22, 23]                           # debits

  # Tier 2
  # REMOVED: label_tenure_stage (deterministic leakage)
  # REMOVED: label_spend_level  (deterministic leakage)
  label_cross_sell_count:
    source: nba_label
    type: list_length
  # REMOVED: label_engagement_score (deterministic leakage — weighted_sum of inputs)

  # Tier 3: product group acquisition (from nba_label indices)
  label_acquire_deposits:
    source: nba_label
    type: list_intersect
    indices: [8, 9, 10]
  label_acquire_investments:
    source: nba_label
    type: list_intersect
    indices: [12, 18]
  label_acquire_accounts:
    source: nba_label
    type: list_intersect
    indices: [2, 5, 6, 7, 11, 19]
  label_acquire_lending:
    source: nba_label
    type: list_intersect
    indices: [13, 15]
  label_acquire_payments:
    source: nba_label
    type: list_intersect
    indices: [4, 17, 20, 22, 23]

  # Tier 3: segmentation
  label_segment:
    source: segment
    type: string_map
    mapping: {"01-TOP": 0, "02-PARTICULARES": 1, "03-UNIVERSITARIO": 2, "UNKNOWN": 3}
  # REMOVED: label_income_tier (deterministic leakage)

  # Tier 5: transaction-based NBA labels
  label_next_mcc:
    source: txn_mcc_seq
    type: sequence_last
    top_k: 50
    default: -1
  label_mcc_diversity_trend:
    source: txn_mcc_seq
    type: sequence_diversity_trend
  label_top_mcc_shift:
    source: txn_mcc_seq
    type: sequence_mode_shift

# ---------------------------------------------------------------------------
# Sequences — two groups with different temporal resolutions
# ---------------------------------------------------------------------------
sequences:
  # Transaction sequences (ealtman-based synthetic)
  txn_sequences:
    mode: time_based          # "time_based" | "count_based"
    window_days: 90           # look-back window in days
    stride_days: 30           # sliding window stride for bootstrapping
    max_len: 200              # safety cap (pad/truncate to this length)
    timestamp_col: txn_date   # column with per-txn timestamps (auto-detect)
    columns:
      txn_amount_seq:
        feat_dim: 1
        dtype: float
        description: "Transaction amount sequence (variable-length, up to 200)"
      txn_mcc_seq:
        feat_dim: 1
        dtype: int
        description: "MCC code sequence (variable-length, up to 200)"
      txn_hour_seq:
        feat_dim: 1
        dtype: int
        description: "Transaction hour sequence (0-23, variable-length)"
      txn_date_seq:
        feat_dim: 1
        dtype: int
        description: "Transaction date (YYYYMMDD int, for time-based windowing)"

  # Product holding sequences (Santander 17-month snapshots)
  # LEAKAGE FIX: truncate_last=1 drops month 17 (the label month).
  # Product sequences remain count_based (monthly snapshots, not date-indexed).
  product_sequences:
    mode: count_based
    max_len: 16
    truncate_last: 1
    columns:
      seq_saving:          {feat_dim: 1, dtype: int, description: "Savings account holding (0/1/-1)"}
      seq_guarantee:       {feat_dim: 1, dtype: int, description: "Guarantee holding (0/1/-1)"}
      seq_checking:        {feat_dim: 1, dtype: int, description: "Checking account holding (0/1/-1)"}
      seq_derivados:       {feat_dim: 1, dtype: int, description: "Derivados holding (0/1/-1)"}
      seq_payroll_acct:    {feat_dim: 1, dtype: int, description: "Payroll account holding (0/1/-1)"}
      seq_junior_acct:     {feat_dim: 1, dtype: int, description: "Junior account holding (0/1/-1)"}
      seq_particular_acct: {feat_dim: 1, dtype: int, description: "Particular account holding (0/1/-1)"}
      seq_particular_plus: {feat_dim: 1, dtype: int, description: "Particular plus holding (0/1/-1)"}
      seq_short_deposit:   {feat_dim: 1, dtype: int, description: "Short deposit holding (0/1/-1)"}
      seq_medium_deposit:  {feat_dim: 1, dtype: int, description: "Medium deposit holding (0/1/-1)"}
      seq_long_deposit:    {feat_dim: 1, dtype: int, description: "Long deposit holding (0/1/-1)"}
      seq_e_account:       {feat_dim: 1, dtype: int, description: "E-account holding (0/1/-1)"}
      seq_funds:           {feat_dim: 1, dtype: int, description: "Funds holding (0/1/-1)"}
      seq_mortgage:        {feat_dim: 1, dtype: int, description: "Mortgage holding (0/1/-1)"}
      seq_pension_plan:    {feat_dim: 1, dtype: int, description: "Pension plan holding (0/1/-1)"}
      seq_loans:           {feat_dim: 1, dtype: int, description: "Loans holding (0/1/-1)"}
      seq_taxes:           {feat_dim: 1, dtype: int, description: "Taxes holding (0/1/-1)"}
      seq_credit_card:     {feat_dim: 1, dtype: int, description: "Credit card holding (0/1/-1)"}
      seq_securities:      {feat_dim: 1, dtype: int, description: "Securities holding (0/1/-1)"}
      seq_home_acct:       {feat_dim: 1, dtype: int, description: "Home account holding (0/1/-1)"}
      seq_payroll:         {feat_dim: 1, dtype: int, description: "Payroll service holding (0/1/-1)"}
      seq_pension_deposit: {feat_dim: 1, dtype: int, description: "Pension deposit holding (0/1/-1)"}
      seq_direct_debit:    {feat_dim: 1, dtype: int, description: "Direct debit holding (0/1/-1)"}
      seq_auto_debit:      {feat_dim: 1, dtype: int, description: "Auto debit holding (0/1/-1)"}
      seq_num_products:    {feat_dim: 1, dtype: int, description: "Total products held per month (0-15)"}
      seq_acquisitions:    {feat_dim: 1, dtype: int, description: "Monthly new acquisitions (len 1-16)"}
      seq_churns:          {feat_dim: 1, dtype: int, description: "Monthly churns (len 1-16)"}

# ---------------------------------------------------------------------------
# Task Groups — Financial DNA (4 semantic groups, adaTT transfer units)
# ---------------------------------------------------------------------------
# REMOVED from engagement: engagement_score (deterministic leakage)
# REMOVED from engagement: has_nba (folded into nba_primary, 2026-04-12)
# REMOVED from lifecycle:  tenure_stage (deterministic leakage)
# REMOVED from value:      spend_level, income_tier (deterministic leakage)
task_groups:
  - name: engagement
    description: "고객이 반응하는가"
    tasks: [next_mcc, top_mcc_shift]
    adatt_intra_strength: 0.8
    adatt_inter_strength: 0.3

  - name: lifecycle
    description: "고객이 어디에 있는가"
    tasks: [churn_signal, product_stability, segment_prediction]
    adatt_intra_strength: 0.7
    adatt_inter_strength: 0.3

  - name: value
    description: "언제/어디서 가치를 만드는가"
    tasks: [mcc_diversity_trend]
    adatt_intra_strength: 0.6
    adatt_inter_strength: 0.3

  - name: consumption
    description: "무엇을 소비하는가"
    tasks: [nba_primary, cross_sell_count, will_acquire_deposits, will_acquire_investments,
            will_acquire_accounts, will_acquire_lending, will_acquire_payments]
    adatt_intra_strength: 0.7
    adatt_inter_strength: 0.3

# ---------------------------------------------------------------------------
# Task Relationships — logit transfer between tasks
# ---------------------------------------------------------------------------
# REMOVED: has_nba → nba_primary (has_nba folded into nba_primary, 2026-04-12)
# REMOVED: engagement_score → has_nba (engagement_score removed, leakage)
# REMOVED: spend_level → cross_sell_count (spend_level removed, leakage)
task_relationships:
  - source: churn_signal
    target: product_stability
    type: causal
    transfer_method: output_concat
    description: "이탈 → 상품 안정성"

  - source: next_mcc
    target: nba_primary
    type: sequential
    transfer_method: hidden_concat
    description: "다음 업종 → 다음 상품 (feature sharing)"

logit_transfer_strength: 0.5

# ---------------------------------------------------------------------------
# Gradient Surgery — Santander task-type groups
# (overrides the empty task_type_groups in common pipeline.yaml)
# ---------------------------------------------------------------------------
grad_surgery:
  task_type_groups:
    binary:     [churn_signal, will_acquire_deposits, will_acquire_investments,
                 will_acquire_accounts, will_acquire_lending, will_acquire_payments,
                 top_mcc_shift]
    multiclass: [nba_primary, segment_prediction, next_mcc]
    regression: [product_stability, cross_sell_count, mcc_diversity_trend]

# ---------------------------------------------------------------------------
# HMM + Multidisciplinary routing (Santander-specific group mappings)
# ---------------------------------------------------------------------------
model:
  hmm_group_mode_map:
    engagement: behavior
    lifecycle: lifecycle
    value: journey
    consumption: journey

  multidisciplinary_routing:
    engagement:  [0, 1, 2, 3, 4, 5]        # chemical_kinetics
    lifecycle:   [6, 7, 8, 9, 10, 11]       # epidemic_diffusion
    value:       [12, 13, 14, 15, 16, 17]   # crime_pattern
    consumption: [18, 19, 20, 21, 22, 23]   # interference

# ---------------------------------------------------------------------------
# Data source — Santander-specific
# ---------------------------------------------------------------------------
data:
  source: data/benchmark/benchmark_v12.parquet
  s3_path: s3://YOUR_S3_BUCKET/data/santander/
  id_col: customer_id
  total_rows: 941132
  train_split: 0.7
  val_split: 0.15

  # Temporal split (leakage prevention)
  # Monthly snapshots (17 dates, 2015-01 to 2016-05).
  # gap_days=30 ensures no overlap between adjacent monthly snapshots.
  temporal_split:
    enabled: true
    date_col: snapshot_date
    gap_days: 30
    train_ratio: 0.7
    val_ratio: 0.15

  # Per-task validation split strategy
  split_strategy:
    state_tasks:
      # REMOVED: tenure_stage, spend_level, income_tier, engagement_score (leakage)
      tasks: [churn_signal, product_stability, segment_prediction]
      val_method: random
    future_tasks:
      tasks: [nba_primary, will_acquire_deposits, will_acquire_investments,
              will_acquire_accounts, will_acquire_lending, will_acquire_payments,
              cross_sell_count]
      val_method: temporal_latest
    sequence_tasks:
      tasks: [next_mcc, mcc_diversity_trend, top_mcc_shift]
      val_method: temporal_latest

  preprocessing:
    fit_subsample_limit: 10000
    # income: 25.4% missing (value=0 means missing) — impute with median
    income:
      null_indicator: 0
      null_rate: 0.254
      strategy: median
    # tenure_months: -999999 sentinel for unknown
    tenure_months:
      sentinel: -999999
      strategy: clip_and_flag
      clip_min: 0
      clip_max: 256
      flag_col: tenure_unknown
    # Leakage prevention
    leakage_prevention:
      recompute_prod_from_seq: true   # Recompute prod_* from seq month 16
      validate_after_split: true      # Run LeakageValidator after train/val split

# ---------------------------------------------------------------------------
# Features — Santander-specific
# ---------------------------------------------------------------------------
features:
  id_cols: [customer_id]
  meta_cols: [snapshot_date]
  input_dim: 512

  categorical:
    - name: gender
      cardinality: 2
      embedding_dim: 4
    - name: segment
      cardinality: 4
      embedding_dim: 4
    - name: country
      cardinality: 118
      embedding_dim: 16
    - name: channel
      cardinality: 163
      embedding_dim: 16
    - name: age_group
      cardinality: 5
      embedding_dim: 4
    - name: income_group
      cardinality: 5
      embedding_dim: 4

  numeric:
    - age
    - income
    - tenure_months
    - is_active
    - num_products

# ---------------------------------------------------------------------------
# Cold Start — customers with insufficient transaction history
# ---------------------------------------------------------------------------
cold_start:
  seq_col: txn_amount_seq           # LIST column used to measure history depth
  min_txn_count: 3                  # <= this count → cold start
  zero_features_prefix:             # generated feature prefixes to zero out
    - hmm_states
    - mamba_temporal
    - tda_local
  keep_features_prefix:             # preserved for cold start
    - prod_
    - synth_
    - tda_global
    - gmm_
    - graph_

# ---------------------------------------------------------------------------
# Training overrides — Santander-specific experiment name
# ---------------------------------------------------------------------------
training:
  experiment_name: santander_ple
  batch_size: 2048    # 941K / 2048 ≈ 460 steps/epoch

# ---------------------------------------------------------------------------
# Distillation overrides — Santander-specific per-task configs
# ---------------------------------------------------------------------------
distillation:
  temperature: 1.0
  alpha: 0.3

  task_lgbm_overrides:
    cross_sell_count:
      objective: huber    # robust to outliers (RMSE gap 0.176 fix)
      alpha: 0.9
    mcc_diversity_trend:
      objective: huber
      alpha: 0.9
    product_stability:
      objective: huber
      alpha: 0.9

  calibration:
    enabled: true
    method: platt
    tasks:
      - churn_signal        # 이탈 확률 → 리텐션 예산 배분 기준
      - product_stability   # 안정성 점수 → 이탈 위험 등급 산정
      - cross_sell_count    # 예상 교차판매 수 → 목표 대비 gap 계산

# ---------------------------------------------------------------------------
# Scoring — FD-TVS composite scoring for Santander
# ---------------------------------------------------------------------------
scoring:
  method: fd_tvs
  weights:
    # Financial DNA task group weights (all 13 tasks)
    # Engagement group
    churn_signal: 0.15
    top_mcc_shift: 0.05
    # Lifecycle group
    nba_primary: 0.15
    segment_prediction: 0.05
    next_mcc: 0.05
    # Value group
    product_stability: 0.10
    cross_sell_count: 0.10
    # Consumption group
    mcc_diversity_trend: 0.05
    # Acquisition group (will_acquire_*)
    will_acquire_deposits: 0.08
    will_acquire_investments: 0.07
    will_acquire_accounts: 0.05
    will_acquire_lending: 0.05
    will_acquire_payments: 0.05
  dna_modifier:
    segment_weights:
      "01-TOP": 1.3
      "02-PARTICULARES": 1.0
      "03-UNIVERSITARIO": 0.8
      "UNKNOWN": 0.7

  # Dynamic per-segment task weight multipliers (on-prem Life Stage pattern)
  # {segment: {task: multiplier (1.0~1.5)}}
  segment_task_weights:
    "01-TOP":              # 우량 고객: 투자/자산안정 우선
      will_acquire_investments: 1.4
      product_stability: 1.3
      cross_sell_count: 1.2
    "02-PARTICULARES":     # 일반 고객: 예적금/결제 우선
      will_acquire_deposits: 1.3
      will_acquire_payments: 1.2
      churn_signal: 1.2
    "03-UNIVERSITARIO":    # 대학생: 계좌개설/결제 우선
      will_acquire_accounts: 1.4
      will_acquire_payments: 1.3
      top_mcc_shift: 1.2
    "UNKNOWN":             # 미분류: 이탈방지 우선
      churn_signal: 1.4
      will_acquire_deposits: 1.2

  # Behavior-based dynamic weight rules
  # If feature > threshold, boost target task weight by multiplier
  dynamic_weight_rules:
    - feature: churn_prob       # 이탈 위험 높으면 이탈방지 태스크 부스트
      threshold: 0.5
      task: churn_signal
      boost: 1.4
    - feature: income           # 고소득이면 투자 태스크 부스트
      threshold: 200000
      task: will_acquire_investments
      boost: 1.3
    - feature: product_diversity  # 상품 적으면 교차판매 부스트
      threshold: 0.3             # 0.3 이하 = 낮은 다양성
      task: will_acquire_deposits
      boost: 1.3
    - feature: engagement_score  # 참여도 높으면 프리미엄 태스크 부스트
      threshold: 0.7
      task: will_acquire_investments
      boost: 1.2

  fatigue:
    decay_rate: 0.85
    max_messages_7d: 5
  risk_penalty:
    max_churn_prob: 0.6
    min_score: 0.05

# ---------------------------------------------------------------------------
# Constraints — filtering and eligibility
# ---------------------------------------------------------------------------
constraints:
  filters:
    - type: fatigue
      max_messages_7d: 5
    - type: eligibility
      min_score: 0.05
      max_churn_prob: 0.6
    - type: owned_product
      check_column_prefix: "prod_"

  product_eligibility:
    standard:
      min_tenure_months: 3
    growth:
      min_tenure_months: 6
    premium:
      min_tenure_months: 12

  top_k:
    k: 5
    diversity_method: mmr
    diversity_lambda: 0.5

# ---------------------------------------------------------------------------
# Ablation Scenarios
# ---------------------------------------------------------------------------
ablation:
  feature_scenarios: auto     # "auto" = dynamically generated from feature_groups.yaml
  expert_scenarios: auto      # "auto" = dynamically generated from model.expert_basket

  # Base feature groups (NOT removed in the "base_only" scenario)
  base_groups: [demographics, product_holdings]

  # Task tiers for Phase 3: task-scale ablation
  # NOTE: was tasks_8/tasks_15/tasks_18 before leakage removal; renamed accordingly.
  # Task tiers updated 2026-04-12: has_nba folded into nba_primary (18→14→13)
  task_tiers:
    tasks_3:    # was tasks_4; removed has_nba
      - churn_signal
      - product_stability
      - nba_primary
    tasks_5:    # was tasks_6; removed has_nba
      - churn_signal
      - product_stability
      - nba_primary
      - cross_sell_count
      - segment_prediction
    tasks_10:   # was tasks_11; removed has_nba
      - churn_signal
      - product_stability
      - nba_primary
      - cross_sell_count
      - will_acquire_deposits
      - will_acquire_investments
      - will_acquire_accounts
      - will_acquire_lending
      - will_acquire_payments
      - segment_prediction
    tasks_13:   # was tasks_14; removed has_nba — full task set
      - churn_signal
      - product_stability
      - nba_primary
      - cross_sell_count
      - will_acquire_deposits
      - will_acquire_investments
      - will_acquire_accounts
      - will_acquire_lending
      - will_acquire_payments
      - segment_prediction
      - next_mcc
      - mcc_diversity_trend
      - top_mcc_shift

  # Architecture ablation variants
  # AMP and LR overrides removed — all variants use script defaults for fair comparison
  structure_variants:
    shared_bottom:
      use_ple: false
      use_adatt: false
    ple_softmax:
      use_ple: true
      use_adatt: false
    ple_sigmoid:
      use_ple: true
      use_adatt: false
    adatt_only:
      use_ple: false
      use_adatt: true
    ple_softmax_adatt:
      use_ple: true
      use_adatt: true
    ple_sigmoid_adatt:
      use_ple: true
      use_adatt: true

  # Budget limit (USD) — ablation stops if cumulative cost exceeds this
  budget_limit: 80.0

  # Default training hyperparameters for all ablation phases
  training_defaults:
    epochs: 5
    batch_size: 5632
    learning_rate: 0.0005
    amp: true
    gradient_accumulation_steps: 1
    early_stopping_patience: 3
    seed: 42
    num_workers: 2
    pin_memory: true
    drop_last: true

  hyperparams:
    learning_rate: [0.0001, 0.0005, 0.001, 0.005]
    temperature: [1.0, 3.0, 5.0, 10.0]
    num_layers: [1, 2, 3]
    extraction_dim: [32, 64, 128]
