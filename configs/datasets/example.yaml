# =============================================================================
# Dataset Config Template — AIOps PLE Platform
# =============================================================================
# PURPOSE: Template for adding a new dataset to the PLE platform.
#
# HOW TO USE:
#   1. Copy this file: cp configs/datasets/example.yaml configs/datasets/YOUR_DATASET.yaml
#   2. Replace every <PLACEHOLDER> with real values for your dataset.
#   3. Add a feature groups file at configs/YOUR_DATASET/feature_groups.yaml
#      (copy configs/santander/feature_groups.yaml as a starting point).
#   4. Implement a data adapter in src/adapters/YOUR_DATASET.py
#      (copy src/adapters/santander.py and modify raw → standardized DataFrame).
#   5. Pass --dataset YOUR_DATASET to train.py / orchestrator.
#
# WHAT THIS FILE CONTROLS (dataset-specific only):
#   - Task definitions, label derivations, sequences
#   - Task groups (adaTT transfer units) and task relationships
#   - Data source path, column names, split strategy, preprocessing rules
#   - Categorical/numeric feature declarations
#   - Ablation task tiers, scoring, constraints
#
# WHAT YOU DO NOT NEED TO CHANGE:
#   - configs/pipeline.yaml  (model arch, training, distillation, AWS — shared)
#   - Any Python source file  (the runner/trainer is fully config-driven)
#
# RULES (CLAUDE.md §1.1 — Config-Driven):
#   - No dataset-specific column names in Python code.
#   - id_cols, date_cols, label_cols must come from this yaml.
#   - feature_groups.yaml input_filter declares generator routing — no
#     hardcoded column-name routing in adapters.
# =============================================================================

# ---------------------------------------------------------------------------
# Dataset metadata
# ---------------------------------------------------------------------------
dataset:
  name: <YOUR_DATASET_NAME>          # e.g., "credit_card_transactions"
  description: >
    <One-paragraph description of the dataset, including row count, key columns,
    and the business problem being solved.>
  total_rows: <ROW_COUNT>            # e.g., 500000
  feature_groups_file: configs/<YOUR_DATASET>/feature_groups.yaml

task_name: <YOUR_DATASET>_ple        # e.g., "credit_card_ple"
adapter: <YOUR_DATASET>              # must match src/adapters/<name>.py

# ---------------------------------------------------------------------------
# Tasks — define every prediction target
# ---------------------------------------------------------------------------
# Each task has: name, type, loss, loss_weight, label_col.
# Types: binary | multiclass | regression
# Losses: focal | ce | huber | mse
#
# "derive" is optional — use it only when the label must be computed from
# raw columns at pipeline time.  Direct labels from the dataset need no "derive".
#
# LEAKAGE RULE: Do NOT create tasks whose labels are deterministic functions
# of input features (e.g., bucket(income) when income is also an input).
# See CLAUDE.md §1.3 for details.
# ---------------------------------------------------------------------------
tasks:

  # --- Example: binary task (direct label) ---
  - name: churn                      # unique task identifier
    type: binary
    loss: focal
    loss_params:
      alpha: 0.85                    # focal loss class weight (minority class)
      gamma: 2.0
    loss_weight: 2.0                 # relative weight in the joint loss
    label_col: churn_label           # column name in the preprocessed DataFrame
    description: "Will the customer churn in the next 30 days?"

  # --- Example: multiclass task (derived via string_map) ---
  - name: segment
    type: multiclass
    loss: ce
    loss_weight: 1.0
    label_col: label_segment
    num_classes: 3                   # must match the number of classes below
    description: "Customer segment classification"
    derive:
      method: string_map
      source_col: segment_raw        # raw column in the adapter output
      mapping: {"PREMIUM": 0, "STANDARD": 1, "BASIC": 2}

  # --- Example: regression task ---
  - name: predicted_spend
    type: regression
    loss: huber
    loss_weight: 1.0
    label_col: next_month_spend      # direct numeric column
    description: "Predicted spending amount for next month"

# ---------------------------------------------------------------------------
# Labels — derivation rules (one entry per derived label_col above)
# ---------------------------------------------------------------------------
# For "direct" labels, just point to the source column.
# For derived labels, specify the derivation method and parameters.
# Commented-out methods show common patterns.
# ---------------------------------------------------------------------------
labels:
  # Direct labels — column already exists in the dataset
  churn_label:
    source: churn_label
    type: direct

  next_month_spend:
    source: next_month_spend
    type: direct

  # Derived via string_map
  label_segment:
    source: segment_raw
    type: string_map
    mapping: {"PREMIUM": 0, "STANDARD": 1, "BASIC": 2}

  # --- Other supported derivation methods (uncomment as needed) ---

  # Bucket (bin) a continuous column — ONLY use if source_col is NOT a model input
  # label_spend_tier:
  #   source: monthly_spend          # must NOT be an input feature (leakage)
  #   type: bucket
  #   boundaries: [500, 2000, 5000]
  #   class_names: [low, medium, high, very_high]

  # List length (count items in a list column)
  # label_product_count:
  #   source: product_list
  #   type: list_length

  # First element of a list, mapped to a group
  # label_top_product_group:
  #   source: product_list
  #   type: list_first_group
  #   default: 0

  # Whether any element of a list is in a given set of indices
  # label_has_loan:
  #   source: product_list
  #   type: list_intersect
  #   indices: [5, 7, 12]

  # Last element of a sequence (for next-item prediction)
  # label_next_item:
  #   source: item_seq
  #   type: sequence_last
  #   top_k: 50
  #   default: -1

# ---------------------------------------------------------------------------
# Sequences — optional (only if your dataset has variable-length sequences)
# ---------------------------------------------------------------------------
# Remove this entire section if you have no sequential data.
# sequences:
#   txn_sequences:
#     mode: time_based              # "time_based" | "count_based"
#     window_days: 90
#     stride_days: 30
#     max_len: 200
#     timestamp_col: txn_date
#     columns:
#       txn_amount_seq:
#         feat_dim: 1
#         dtype: float
#         description: "Transaction amount sequence"

# ---------------------------------------------------------------------------
# Task Groups — semantic groups for adaTT transfer and expert routing
# ---------------------------------------------------------------------------
# Group tasks that share business semantics (adaTT transfers knowledge
# within high-intra groups and less across low-inter groups).
# Every task must belong to exactly one group.
task_groups:
  - name: retention
    description: "Customer retention and risk tasks"
    tasks: [churn]
    adatt_intra_strength: 0.7
    adatt_inter_strength: 0.3

  - name: value
    description: "Customer value and spending tasks"
    tasks: [predicted_spend, segment]
    adatt_intra_strength: 0.7
    adatt_inter_strength: 0.3

# ---------------------------------------------------------------------------
# Task Relationships — logit transfer between semantically related tasks
# ---------------------------------------------------------------------------
# Optional.  Encodes domain knowledge: e.g., "if churn is high,
# future spending is lower" (causal relationship).
# Methods: output_concat | hidden_concat | residual
# ---------------------------------------------------------------------------
task_relationships:
  - source: churn
    target: predicted_spend
    type: causal
    transfer_method: output_concat
    description: "Churn risk reduces expected future spend"

logit_transfer_strength: 0.5     # global scaling for all transfers above

# ---------------------------------------------------------------------------
# Gradient Surgery — task type groups (enables PCGrad projection)
# ---------------------------------------------------------------------------
grad_surgery:
  task_type_groups:
    binary:     [churn]
    multiclass: [segment]
    regression: [predicted_spend]

# ---------------------------------------------------------------------------
# Data source — paths and split settings
# ---------------------------------------------------------------------------
data:
  source: data/<YOUR_DATASET>/train.parquet   # local path OR S3 path
  s3_path: s3://YOUR_S3_BUCKET/data/<YOUR_DATASET>/
  id_col: customer_id                         # primary key column name
  total_rows: <ROW_COUNT>

  # Temporal split (recommended for time-series / snapshot data)
  temporal_split:
    enabled: true
    date_col: snapshot_date                   # date column for ordering
    gap_days: 7                               # minimum gap (CLAUDE.md §1.3)
    train_ratio: 0.7
    val_ratio: 0.15

  # OR: random split (for cross-sectional data)
  # train_split: 0.7
  # val_split: 0.15

  # Per-task validation strategy
  split_strategy:
    state_tasks:
      tasks: [churn, segment]
      val_method: random
    future_tasks:
      tasks: [predicted_spend]
      val_method: temporal_latest

  # Column-level preprocessing rules (dataset-specific null/sentinel handling)
  preprocessing:
    fit_subsample_limit: 10000
    # Example: handle missing income encoded as 0
    # income:
    #   null_indicator: 0
    #   null_rate: 0.20
    #   strategy: median

# ---------------------------------------------------------------------------
# Features — column declarations for your dataset
# ---------------------------------------------------------------------------
features:
  id_cols: [customer_id]              # columns to exclude from model inputs
  meta_cols: [snapshot_date]          # metadata columns (not model inputs)
  input_dim: 256                      # target input dimensionality after Phase 0

  # Categorical columns requiring embedding (low-cardinality)
  categorical:
    - name: gender
      cardinality: 2
      embedding_dim: 4
    # Add more categorical columns here

  # Numeric columns (continuous or binary flags)
  numeric:
    - age
    - income
    - num_products
    # Add more numeric columns here

# ---------------------------------------------------------------------------
# Cold Start — customers with insufficient history (optional)
# ---------------------------------------------------------------------------
# Remove if your dataset has no sequence features.
# cold_start:
#   seq_col: txn_amount_seq
#   min_txn_count: 3
#   zero_features_prefix:
#     - hmm_states
#     - mamba_temporal
#     - tda_local

# ---------------------------------------------------------------------------
# Training overrides (optional — inherits from configs/pipeline.yaml)
# ---------------------------------------------------------------------------
training:
  experiment_name: <YOUR_DATASET>_ple
  # batch_size: 2048                 # uncomment to override common default
  # epochs: 50

# ---------------------------------------------------------------------------
# Distillation overrides (optional)
# ---------------------------------------------------------------------------
distillation:
  calibration:
    enabled: true
    method: platt
    tasks: [churn]                   # tasks requiring calibrated probabilities

  # Per-task LGBM overrides for regression tasks with outlier-heavy labels
  task_lgbm_overrides: {}
  # Example:
  # predicted_spend:
  #   objective: huber
  #   alpha: 0.9

# ---------------------------------------------------------------------------
# Scoring (optional — remove if you don't use FD-TVS composite scoring)
# ---------------------------------------------------------------------------
# scoring:
#   method: fd_tvs
#   weights:
#     churn: 0.4
#     predicted_spend: 0.3
#     segment: 0.3

# ---------------------------------------------------------------------------
# Constraints (optional — remove if no eligibility filtering needed)
# ---------------------------------------------------------------------------
# constraints:
#   filters:
#     - type: fatigue
#       max_messages_7d: 5
#   top_k:
#     k: 5
#     diversity_method: mmr
#     diversity_lambda: 0.5

# ---------------------------------------------------------------------------
# Ablation Scenarios
# ---------------------------------------------------------------------------
ablation:
  feature_scenarios: auto     # dynamically generated from feature_groups.yaml
  expert_scenarios: auto      # dynamically generated from model.expert_basket
  base_groups: [demographics] # groups kept in the "base_only" scenario

  # Task tiers: start small, verify end-to-end, then add more tasks
  task_tiers:
    tasks_1:
      - churn
    tasks_2:
      - churn
      - predicted_spend
    tasks_3:
      - churn
      - predicted_spend
      - segment

  budget_limit: 50.0

  training_defaults:
    epochs: 5
    batch_size: 2048
    learning_rate: 0.0005
    amp: true
    gradient_accumulation_steps: 1
    early_stopping_patience: 3
    seed: 42
    num_workers: 2
    pin_memory: true
    drop_last: true

  hyperparams:
    learning_rate: [0.0001, 0.0005, 0.001]
    num_layers: [1, 2, 3]
    extraction_dim: [32, 64, 128]
