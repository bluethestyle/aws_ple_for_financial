# =============================================================================
# 644D Financial Feature Glossary
# =============================================================================
# Maps feature indices to Korean financial business language.
# Used by ReverseMapper to generate human-readable explanations.
#
# Structure:
#   feature_groups.<group_name>.features.<feature_id>:
#     name:      Korean business name
#     template:  Korean template with {value} placeholder
#     unit:      Display unit
#     direction: lower_is_better | higher_is_better (optional)
#
# Total: 644D across 13 groups in the main feature vector
#   base_rfm(34) + base_category(64) + base_txn_stats(80) + base_temporal(60)
#   + multi_source(91) + extended_source(84) + tda_topology(70)
#   + gmm_clustering(22) + mamba_temporal(50) + economics(17)
#   + multidisciplinary(24) + model_derived(27) + merchant_hierarchy(21)
# =============================================================================

