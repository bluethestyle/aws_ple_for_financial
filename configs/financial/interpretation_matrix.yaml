# =============================================================================
# Interpretation Matrix — Level 1 + Level 2 definitions
# =============================================================================
#
# Level 1: feature_group × task_group → default interpretation direction
#   13 groups × 4 task groups = 52 combinations (auto-generated if missing)
#
# Level 2: feature_group × task → specific interpretation (override)
#   Only define where the default Level 1 is insufficient
#
# Level 3 lives in feature_glossary.yaml → task_interpretations (per-feature)
#
# Resolution: Level 3 → Level 2 → Level 1 → glossary fallback
# =============================================================================

