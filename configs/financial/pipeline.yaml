# ---------------------------------------------------------------------------
# Model -- PLE architecture with shared experts
# ---------------------------------------------------------------------------
model:
  architecture: ple
  num_shared_experts: 7
  num_task_experts: 2
  expert_hidden_dim: 256
  num_layers: 2
  tower_dims: [64, 32]
  dropout: 0.2
  # -------------------------------------------------------------------------
  # Expert Basket -- subset selection from Expert Pool (11 registered)
  # 3-tier: Pool (all registered) -> Basket (selected below) -> CGC Gating
  # Note: output_dim overrides per expert are ignored by ExpertBasket -- it
  # forces all shared experts to use the same output_dim (expert_hidden_dim/4
  # or 64) so that torch.stack in CGCLayer.forward() succeeds.
  # -------------------------------------------------------------------------
  expert_basket:
    shared_experts:
      - hgcn
      - perslay
      - deepfm
      - temporal_ensemble
      - lightgcn
      - causal
      - optimal_transport
    task_experts:
      - mlp
    expert_configs:
      hgcn:
        hidden_dim: 128
        dropout: 0.2
      perslay:
        use_raw_diagram: false
        tda_dim: 70
      deepfm:
        embedding_dim: 16
        hidden_dims: [256, 128, 64]
      temporal_ensemble: {}
      lightgcn:
        output_dim: 64
        hidden_dim: 128
        dropout: 0.1
      causal: {}
      optimal_transport: {}
  # -------------------------------------------------------------------------
  # GroupEncoder + ClusterEmbedding + TaskHead (original v3.2 architecture)
  # Replaces per-group task expert overrides with efficient shared encoders.
  # 4 group encoders shared across 16 tasks -> ~88% parameter reduction.
  # -------------------------------------------------------------------------
  group_task_expert:
    enabled: true
    group_hidden_dim: 128
    group_output_dim: 64     # GroupEncoder output
    cluster_embed_dim: 32    # ClusterEmbedding output
    # Total: 64 + 32 = 96D → directly to TaskTower (no TaskHead bottleneck)
    dropout: 0.2

# ---------------------------------------------------------------------------
# Training -- 2-phase setup matching original
# ---------------------------------------------------------------------------
training:
  batch_size: 4096
  epochs: 100
  learning_rate: 0.0005
  early_stopping_patience: 7
  seed: 42

# ---------------------------------------------------------------------------
# AWS / SageMaker configuration
# ---------------------------------------------------------------------------
aws:
  region: ap-northeast-2
  s3_bucket: aiops-ple-financial
  instance_type: ml.g4dn.xlarge
  use_spot: true
  max_run_seconds: 28800
  role_arn: arn:aws:iam::ACCOUNT_ID:role/SageMakerExecutionRole
