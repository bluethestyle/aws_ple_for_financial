# =============================================================================
# Financial Recommendation Pipeline Configuration
# =============================================================================
# Converted from gotothemoon on-prem PLE-adaTT + Cluster Head system.
# Original: 644D features, 16 active tasks, 50+ Hive tables, 20 GMM clusters.
# AWS version: config-driven, SageMaker-native.
#
# This file conforms to PipelineConfig (core/pipeline/config.py):
#   task_name, tasks[], data{}, features{}, model{}, training{}, aws{}
# =============================================================================

task_name: financial_recommendation_ple

# ---------------------------------------------------------------------------
# Tasks -- 16 active tasks matching original gotothemoon system
# ---------------------------------------------------------------------------
tasks:
  # ===== Engagement Group =====
  - name: ctr
    type: binary
    loss: focal
    loss_weight: 1.0
    label_col: label_ctr

  - name: cvr
    type: binary
    loss: focal
    loss_weight: 1.5
    label_col: label_cvr

  # ===== Lifecycle Group =====
  - name: churn
    type: binary
    loss: focal
    loss_weight: 1.2
    label_col: label_churn

  - name: retention
    type: binary
    loss: focal
    loss_weight: 1.0
    label_col: label_retention

  - name: life_stage
    type: multiclass
    loss: ce
    loss_weight: 0.8
    label_col: label_life_stage
    num_classes: 6

  - name: ltv
    type: regression
    loss: huber
    loss_weight: 1.5
    label_col: label_ltv

  # ===== Value Group =====
  - name: balance_util
    type: regression
    loss: huber
    loss_weight: 1.0
    label_col: label_balance_util

  - name: engagement
    type: regression
    loss: mse
    loss_weight: 0.8
    label_col: label_engagement

  - name: channel
    type: multiclass
    loss: ce
    loss_weight: 0.8
    label_col: label_channel
    num_classes: 3

  - name: timing
    type: multiclass
    loss: ce
    loss_weight: 0.8
    label_col: label_timing
    num_classes: 28

  # ===== Consumption Group =====
  - name: nba
    type: multiclass
    loss: ce
    loss_weight: 2.0
    label_col: label_nba
    num_classes: 12

  - name: spending_category
    type: multiclass
    loss: ce
    loss_weight: 1.2
    label_col: label_spending_category
    num_classes: 12

  - name: consumption_cycle
    type: multiclass
    loss: ce
    loss_weight: 0.8
    label_col: label_consumption_cycle
    num_classes: 7

  - name: spending_bucket
    type: regression
    loss: huber
    loss_weight: 0.8
    label_col: label_spending_amount

  - name: merchant_affinity
    type: regression
    loss: huber
    loss_weight: 1.0
    label_col: label_merchant_affinity

  - name: brand_prediction
    type: contrastive
    loss: infonce
    loss_weight: 2.0
    label_col: label_next_brand
    num_classes: 128
    tower_type: contrastive
    tower_dims: [64, 64]

# ---------------------------------------------------------------------------
# Task Groups -- single source of truth for adaTT, loss weighting, monitoring
# ---------------------------------------------------------------------------
task_groups:
  - name: engagement
    tasks: [ctr, cvr]
    task_experts: [deepfm]
    adatt_intra_strength: 0.8
    adatt_inter_strength: 0.3
    description: "User engagement prediction tasks"
  - name: lifecycle
    tasks: [churn, retention, life_stage, ltv]
    task_experts: [causal, mlp]
    adatt_intra_strength: 0.6
    adatt_inter_strength: 0.3
    description: "Customer lifecycle management tasks"
  - name: value
    tasks: [balance_util, channel, timing]
    task_experts: [mlp]
    adatt_intra_strength: 0.7
    adatt_inter_strength: 0.3
    description: "Customer value optimization tasks"
  - name: consumption
    tasks: [nba, spending_category, consumption_cycle, spending_bucket, merchant_affinity, brand_prediction]
    task_experts: [deepfm, xdeepfm]
    adatt_intra_strength: 0.7
    adatt_inter_strength: 0.3
    description: "Consumption pattern and product recommendation tasks"

# ---------------------------------------------------------------------------
# Data source
# ---------------------------------------------------------------------------
data:
  source: s3://aiops-ple-financial/data/train/
  format: parquet
  train_split: 0.8
  val_split: 0.1

